name: Cleanup Stale Branches

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cleanup-branches.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'sss97133';
            const repo = 'nuke';
            const keepBranches = ['main', 'feat/parts-monetization-system'];
            
            // Get all branches (handle pagination)
            let allBranches = [];
            let page = 1;
            while (true) {
              const { data: branches } = await github.rest.repos.listBranches({
                owner,
                repo,
                per_page: 100,
                page
              });
              allBranches = allBranches.concat(branches);
              if (branches.length < 100) break;
              page++;
            }
            
            console.log(`Found ${allBranches.length} total branches`);
            
            let deleted = 0;
            let failed = 0;
            
            for (const branch of allBranches) {
              if (keepBranches.includes(branch.name)) {
                console.log(`KEEP: ${branch.name}`);
                continue;
              }
              
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`
                });
                console.log(`DELETED: ${branch.name}`);
                deleted++;
              } catch (err) {
                console.log(`FAILED: ${branch.name} - ${err.message}`);
                failed++;
              }
            }
            
            console.log(`\nDone. Deleted: ${deleted}, Failed: ${failed}, Kept: ${keepBranches.length}`);