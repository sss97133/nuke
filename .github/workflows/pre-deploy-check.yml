name: Pre-Deploy Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nuke_frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./nuke_frontend
        run: npm ci

      - name: Type check
        working-directory: ./nuke_frontend
        run: npm run type-check || npx tsc --noEmit --skipLibCheck

      - name: Lint check
        working-directory: ./nuke_frontend
        run: npm run lint || echo "Linting issues found but continuing..."

      - name: Build check
        working-directory: ./nuke_frontend
        run: |
          echo "🔨 Building project..."
          npm run build || {
            echo "❌ Build failed!"
            echo "Checking for common issues..."
            # List files that might be missing
            ls -la src/components/parts/ || echo "parts directory missing"
            echo "Build error details above ⬆️"
            exit 1
          }
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Check for missing imports
        run: |
          echo "Checking for common build issues..."
          # The required-files list is intentionally narrow: only files actively
          # imported by entrypoints. PartCheckoutModal / PartEnrichmentModal were
          # retired with the parts-checkout feature and removed here so the build
          # check stays in sync with reality.
          for file in \
            "nuke_frontend/src/components/parts/SpatialPartPopup.tsx" \
            "nuke_frontend/src/components/parts/ClickablePartModal.tsx"
          do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            fi
          done
          echo "✅ All required files present"

      - name: Verify TypeScript config
        run: |
          if ! grep -q '"baseUrl"' nuke_frontend/tsconfig.app.json; then
            echo "❌ Missing baseUrl in tsconfig.app.json"
            exit 1
          fi
          if ! grep -qE '"@/\*"' nuke_frontend/tsconfig.app.json; then
            echo "❌ Missing @/* path mapping in tsconfig.app.json"
            exit 1
          fi
          echo "✅ TypeScript config valid"

