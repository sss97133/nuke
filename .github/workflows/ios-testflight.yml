# Ship NukeCapture-iOS to TestFlight from a GitHub macOS runner.
#
# Clean-room replacement for the two methods that failed us: hand-archiving in
# Xcode (manual, broke on the build-number reset) and Xcode Cloud (never set up
# — there is no committed .xcodeproj for it to build). This pipeline generates
# the project, stamps a fresh build number, signs with an imported distribution
# cert + App Store Connect API key, and uploads to TestFlight. Logs are visible
# in the Actions tab, so failures are debuggable.
#
# Trigger: manual only for now (Actions tab → "iOS TestFlight" → Run workflow,
# also works from the GitHub mobile app). We add push-on-merge once it's green.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ASC_KEY_ID            App Store Connect API key id (e.g. 77637BYL66)
#   ASC_ISSUER_ID         ASC API issuer id (Users and Access → Integrations)
#   ASC_KEY_P8_BASE64     base64 of AuthKey_<id>.p8   (`base64 -i AuthKey_77637BYL66.p8 | pbcopy`)
#   APPLE_TEAM_ID         10-char Apple Developer team id
#   DIST_CERT_P12_BASE64  base64 of your Apple Distribution cert exported as .p12
#   DIST_CERT_PASSWORD    the password you set when exporting that .p12

name: iOS TestFlight

on:
  workflow_dispatch:

# This job only reads the repo (build + sign happen with Apple credentials, not
# the GitHub token). Pin to least privilege per CodeQL actions/missing-permissions.
permissions:
  contents: read

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      APP_DIR: apps/nuke-capture-ios
      SCHEME: NukeCapture-iOS
      PROJECT: NukeCapture-iOS.xcodeproj
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project (stamps a fresh build number)
        working-directory: ${{ env.APP_DIR }}
        run: ./generate.sh

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Import distribution certificate into a temp keychain
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KPW="$(uuidgen)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          # Make the temp keychain the default search list so codesign can find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/["[:space:]]//g')
          rm -f "$RUNNER_TEMP/dist.p12"
          echo "Imported signing identities:"; security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Archive
        working-directory: ${{ env.APP_DIR }}
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/NukeCapture.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            clean archive

      - name: Export signed IPA
        working-directory: ${{ env.APP_DIR }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/NukeCapture.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        run: |
          IPA="$(ls "$RUNNER_TEMP/export/"*.ipa | head -1)"
          echo "Uploading $IPA"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload build artifacts (on failure too)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-output
          path: |
            ${{ runner.temp }}/export/*.ipa
            ${{ runner.temp }}/NukeCapture.xcarchive/Info.plist
          if-no-files-found: ignore
          retention-days: 7
