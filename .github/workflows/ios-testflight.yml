name: iOS TestFlight

# Builds apps/nuke-capture-ios and uploads it to TestFlight from a GitHub
# runner — the GitHub Actions equivalent of the Xcode Cloud setup in
# apps/nuke-capture-ios/ci_scripts/. Consumes six repo secrets:
#
#   ASC_KEY_ID            App Store Connect API key id (77637BYL66)
#   ASC_ISSUER_ID         App Store Connect API issuer id
#   ASC_KEY_P8_BASE64     base64 of AuthKey_<ASC_KEY_ID>.p8
#   APPLE_TEAM_ID         10-char Apple Developer team id
#   DIST_CERT_P12_BASE64  base64 of the Apple Distribution cert (.p12)
#   DIST_CERT_PASSWORD    password for that .p12
#
# Manual-trigger only by default so it never silently burns a TestFlight build
# number or runner minutes. Flip on the push trigger below once it's green.

on:
  workflow_dispatch:
  # push:
  #   branches: [fable5/ignition-ios]
  #   paths:
  #     - apps/nuke-capture-ios/**
  #     - .github/workflows/ios-testflight.yml

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build:
    # macOS 26 (Tahoe) image — REQUIRED: the app targets the iOS 26 SDK (Liquid
    # Glass), which only ships with Xcode 26, which only runs on macOS 26. A
    # macos-15 runner has at most Xcode 16 → the archive fails on the iOS 26 SDK.
    runs-on: macos-26
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/nuke-capture-ios
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      # Mirror ci_scripts/ci_post_clone.sh exactly. The build number MUST be
      # sed'd into CURRENT_PROJECT_VERSION *before* xcodegen — editing the
      # generated Info.plist afterward does not stick (Process-Info.plist
      # re-substitutes $(CURRENT_PROJECT_VERSION) at build time), which is what
      # collided builds 29 and 30 on TestFlight. An epoch timestamp is always
      # above any prior build number and fits CFBundleVersion's uint32 ceiling.
      - name: Set build number + generate project
        run: |
          set -e
          BUILD_NUM=$(date +%s)
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml
          echo "▸ CURRENT_PROJECT_VERSION -> $BUILD_NUM"
          xcodegen generate
          SWIFTPM_DIR="NukeCapture-iOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm"
          mkdir -p "$SWIFTPM_DIR"
          cp Package.resolved "$SWIFTPM_DIR/Package.resolved"

      # No manual distribution-certificate import. The Archive + Export steps use
      # CODE_SIGN_STYLE=Automatic + -allowProvisioningUpdates with the App Store
      # Connect API key, so xcodebuild creates/fetches the distribution cert +
      # provisioning profile itself (requires the ASC key to have Admin/App-Manager
      # cert access). This removes the dependency on the DIST_CERT_P12_BASE64 secret,
      # whose import was the only failing step (the keychain import returned exit 1).
      - name: Write App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_$ASC_KEY_ID.p8"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project NukeCapture-iOS.xcodeproj \
            -scheme NukeCapture-iOS \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/NukeCapture.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_$ASC_KEY_ID.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic

      - name: Export archive and upload to TestFlight
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/NukeCapture.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_$ASC_KEY_ID.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
