# project.yml — XcodeGen spec for the Nuke iOS capture app.
#
# The .xcodeproj is GENERATED, never committed. To produce it:
#
#   brew install xcodegen
#   cd apps/nuke-capture-ios
#   xcodegen generate
#   open NukeCapture-iOS.xcodeproj
#
# Then in Xcode: select the NukeCapture-iOS target → Signing & Capabilities →
# set Team (DEVELOPMENT_TEAM is intentionally NOT pinned here so the spec
# works for any team; "Automatically manage signing" handles the rest).
#
# Spec reference: https://github.com/yonaskolb/XcodeGen/blob/master/Docs/ProjectSpec.md

name: NukeCapture-iOS

options:
  bundleIdPrefix: ag.nuke
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  # Same SDK + major version as the proven Mac relay (apps/nuke-capture-mac).
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  # On-device local store — the app's own DB (local-first pipeline, the notebook).
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.0.0

targets:
  NukeCapture-iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
      # Privacy manifest must land in the app bundle root as a resource —
      # App Store Connect scans for it at upload time.
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ag.nuke.capture
        PRODUCT_NAME: NukeCapture
        MARKETING_VERSION: "1.0.1"
        # CI OWNS THE BUILD NUMBER — do NOT bump this per release. ci_post_clone.sh
        # rewrites CURRENT_PROJECT_VERSION to an epoch timestamp ($(date +%s)) before
        # xcodegen, and ci_pre_xcodebuild.sh PlistBuddy-stamps CFBundleVersion to the
        # same epoch. TestFlight builds are therefore epoch-numbered (~1.78e9); this
        # literal is a placeholder for local/sim builds only and is overwritten on CI.
        CURRENT_PROJECT_VERSION: 33
        # Swift 5 language mode, same rationale as the Mac relay's
        # Package.swift: PhotoKit's observer/callback surface predates strict
        # Sendable checking. All mutable state is main-actor-confined by hand.
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only — keep review surface small
        CODE_SIGN_STYLE: Automatic
        # Owner sets Team in Xcode after `xcodegen generate` (see header).
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # App icon (Sources/Assets.xcassets/AppIcon.appiconset) — single
        # 1024px wordmark; Xcode derives every size. Upload validation
        # rejects icon-less bundles (codes 90022/90713).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # ── Sign in with Apple capability ──
    # XcodeGen writes this entitlements file at generate time (same lifecycle
    # as Generated/Info.plist — generated, never committed). The capability
    # must ALSO be enabled on the ag.nuke.capture App ID in the developer
    # portal; automatic signing then regenerates the provisioning profile to
    # match. Full setup: apps/SIGN_IN_WITH_APPLE_SETUP.md.
    entitlements:
      path: Generated/NukeCapture-iOS.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Nuke
        CFBundleShortVersionString: $(MARKETING_VERSION)
        # PLACEHOLDER — do NOT bump per release. ci_pre_xcodebuild.sh PlistBuddy-stamps
        # this to an epoch timestamp ($(date +%s)) on the runner, so the TestFlight build
        # number is always epoch-based and monotonic (builds 29/30 collided on small
        # integers, which is why we moved to epochs). This value matters only for a
        # local/sim build, where it isn't uploaded. Keep it low and inert.
        CFBundleVersion: "33"
        # OAuth callback scheme for the ASWebAuthenticationSession providers
        # (Google, GitHub). ASWebAuthenticationSession needs this scheme so
        # the Supabase redirect (ag.nuke.capture://login-callback) returns
        # control to the app. Must match Config.oauthRedirectURL.
        CFBundleURLTypes:
          - CFBundleURLName: ag.nuke.capture.oauth
            CFBundleURLSchemes:
              - ag.nuke.capture
        UILaunchScreen: {}                    # empty dict = system launch screen, full-size rendering
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # ── Photo library (read) ── the ONLY sensitive permission this app asks for.
        # This exact string also goes in the App Privacy questionnaire answers
        # (see apps/APP_STORE_LAUNCH.md) — keep them in sync. Register: report,
        # don't teach (CONSTRAINTS.md C8).
        NSPhotoLibraryUsageDescription: >-
          Photos taken at your work sites join your record. Everything else
          stays on this phone.
        # ── Background Modes capability (fetch/processing via BGTaskScheduler) ──
        # The "capability" in Xcode's UI is just these plist keys; no
        # entitlement file is required for fetch/processing.
        UIBackgroundModes:
          - fetch
          - processing
        # Every BGTaskScheduler identifier the app registers must be listed
        # here or registration traps at runtime.
        BGTaskSchedulerPermittedIdentifiers:
          - ag.nuke.capture.refresh
          - ag.nuke.capture.backfill
        # App makes HTTPS-only calls (Supabase) → exempt from export
        # compliance docs; answering here skips the question on every upload.
        ITSAppUsesNonExemptEncryption: false

schemes:
  NukeCapture-iOS:
    build:
      targets:
        NukeCapture-iOS: all
    run:
      config: Debug
    archive:
      config: Release
