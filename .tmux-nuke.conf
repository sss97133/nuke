# Nuke Command Center — tmux config

# Mouse support (click between panes, scroll)
set -g mouse on

# Pane borders with agent names
set -g pane-border-format " #{pane_title} "
set -g pane-border-status top
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour39

# Status bar
set -g status-style bg=colour235,fg=colour248
set -g status-left "#[fg=colour39,bold] NUKE #[fg=colour248]| "
set -g status-left-length 15
set -g status-right " %H:%M "
set -g status-right-length 10

# Window tabs in status bar
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour39,bold] #I:#W "

# Scrollback
set -g history-limit 50000

# Don't auto-rename windows
set -g allow-rename off

# Index from 1
set -g base-index 1
setw -g pane-base-index 1
