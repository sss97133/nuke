<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Map — Nuke</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #1e1e1e;
      --surface: #252526;
      --surface-hover: #2d2d30;
      --border: #3e3e42;
      --border-focus: #cccccc;
      --text: #cccccc;
      --text-secondary: #858585;
      --text-disabled: #656565;
      --accent: #cccccc;
      --accent-dim: rgba(204, 204, 204, 0.12);
      --success: #16825d;
      --tile-bg: #f0efe8;
      --tile-bg-alt: #e8e7e0;
      --tile-border: #2a2a2a;
      --tile-text: #1a1a1a;
      --tile-text-secondary: #555;
      --tile-others: #e0d8d0;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      --font-mono: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      --radius: 3px;
      --transition: 0.12s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-family);
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.3;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      padding: 12px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 20px;
      font-size: 10px;
      color: var(--text-secondary);
    }
    .stat-item .stat-value {
      color: var(--text);
      font-weight: 700;
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .stat-item .stat-label {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-left: 4px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 3px;
    }
    .btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      padding: 4px 10px;
      font-size: 9px;
      font-weight: 600;
      font-family: var(--font-family);
      cursor: pointer;
      transition: var(--transition);
      border-radius: var(--radius);
    }
    .btn:hover { color: var(--text); border-color: var(--accent); }
    .btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .btn-group { display: flex; gap: 3px; margin-left: 12px; }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 6px;
      font-size: 10px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .breadcrumb a {
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      padding: 2px 0;
    }
    .breadcrumb a:hover { color: var(--text); text-decoration: underline; }
    .breadcrumb .sep { color: var(--text-disabled); margin: 0 6px; font-size: 9px; }
    .breadcrumb .current { color: var(--text); font-weight: 600; }

    /* Treemap container */
    #treemap-container {
      position: relative;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg);
      flex: 1;
      min-height: 0;
    }

    .loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-disabled);
      font-size: 11px;
    }

    /* Treemap nodes (div-based for nested layout) */
    .treemap-root {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .tm-group {
      position: absolute;
      overflow: hidden;
      border: 1px solid rgba(42, 42, 42, 0.6);
      border-radius: 2px;
      background: rgba(30, 30, 30, 0.3);
    }
    .tm-group-label {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 3px 5px 2px;
      font-size: 9px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(30,30,30,0.85) 0%, rgba(30,30,30,0.4) 80%, transparent 100%);
    }
    .tm-group-label .group-value {
      font-weight: 400;
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--text-secondary);
      margin-left: 6px;
    }
    .tm-leaf {
      position: absolute;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--tile-border);
      border-radius: 1px;
      background: var(--tile-bg);
      transition: filter 0.1s;
    }
    .tm-leaf:hover {
      filter: brightness(0.92);
      z-index: 5;
    }
    .tm-leaf.others {
      background: var(--tile-others);
      cursor: pointer;
    }
    .tm-leaf-inner {
      padding: 3px 4px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .tm-leaf-name {
      font-size: 8px;
      font-weight: 600;
      color: var(--tile-text);
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tm-leaf-value {
      font-size: 8px;
      font-family: var(--font-mono);
      color: var(--tile-text-secondary);
      margin-top: 1px;
      white-space: nowrap;
    }
    .tm-leaf-count {
      font-size: 7px;
      color: #888;
      margin-top: auto;
    }

    /* Flat treemap (for drill-down levels) */
    .tm-flat {
      position: absolute;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--tile-border);
      border-radius: 1px;
      background: var(--tile-bg);
      transition: filter 0.1s;
    }
    .tm-flat:hover { filter: brightness(0.92); z-index: 5; }
    .tm-flat.others { background: var(--tile-others); }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 10px 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 1000;
      min-width: 180px;
      max-width: 280px;
      font-size: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .tooltip.visible { opacity: 1; }
    .tooltip-name {
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 4px;
      font-size: 11px;
    }
    .tooltip-value {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--success);
      margin-bottom: 8px;
    }
    .tooltip-divider {
      border: none;
      border-top: 1px solid #333;
      margin: 6px 0;
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3px;
      color: #999;
    }
    .tooltip-row .pct {
      font-family: var(--font-mono);
      color: #ccc;
      font-weight: 600;
      font-size: 10px;
    }
    .tooltip-row .label {
      font-size: 9px;
      text-align: right;
      margin-left: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="title">Market Map</div>
        <div class="stats-bar">
          <div class="stat-item">
            <span class="stat-value" id="total-value">-</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="total-count">-</span>
            <span class="stat-label">Vehicles</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="avg-price">-</span>
            <span class="stat-label">Avg</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;">
        <div class="controls" id="view-controls">
          <button class="btn active" data-view="segment">Segment</button>
          <button class="btn" data-view="source">Source</button>
          <button class="btn" data-view="brand">Brand</button>
        </div>
        <div class="btn-group">
          <button class="btn active" data-metric="value">Value</button>
          <button class="btn" data-metric="count">Volume</button>
          <button class="btn" data-metric="avg">Avg Price</button>
        </div>
      </div>
    </div>

    <div class="breadcrumb" id="breadcrumb">
      <span class="current">All Segments</span>
    </div>

    <div id="treemap-container">
      <div class="treemap-root" id="treemap-root"></div>
      <div class="loading" id="loading">Loading...</div>
    </div>
  </div>

  <div class="tooltip" id="tooltip">
    <div class="tooltip-name"></div>
    <div class="tooltip-value"></div>
    <hr class="tooltip-divider">
    <div class="tooltip-stats"></div>
  </div>

  <script>
    const API = 'https://qkgaybvrernstplzjaam.supabase.co/functions/v1/treemap-vehicles';
    const MAX_CHILDREN = 8; // Show top N, rest becomes "+N others"

    // Format helpers
    const fmtMoney = n => {
      if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
      if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + Math.round(n);
    };
    const fmtNum = n => n.toLocaleString();

    // State
    let data = null, nestedData = null, metric = 'value', view = 'segment', filters = {}, history = [];
    let parentTotals = {}; // for tooltip % of parent

    // View/root labels
    const viewRootLabels = { source: 'All Sources', brand: 'All Brands', segment: 'All Segments' };

    // Fetch data
    async function load(f = {}, useNested = false) {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('treemap-root').innerHTML = '';

      const p = new URLSearchParams();
      p.set('view', view);
      if (useNested) p.set('nested', 'true');
      if (f.source) p.set('source', f.source);
      if (f.segment) p.set('segment', f.segment);
      if (f.make) p.set('make', f.make);
      if (f.model) p.set('model', f.model);
      if (f.year) p.set('year', f.year);

      try {
        const r = await fetch(`${API}?${p}`);
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        data = d;
        filters = f;
        nestedData = useNested ? d.hierarchy : null;
        requestAnimationFrame(() => requestAnimationFrame(render));
      } catch (e) {
        console.error(e);
        document.getElementById('loading').textContent = 'Error: ' + e.message;
      }
    }

    // Navigate
    function nav(f, useNested = false) {
      history.push({ ...filters, _nested: !!nestedData });
      load(f, useNested);
    }
    function back() {
      if (history.length) {
        const prev = history.pop();
        const wasNested = prev._nested;
        delete prev._nested;
        load(prev, wasNested);
      }
    }

    // Switch view
    function setView(v) {
      if (v === view) return;
      view = v;
      history = [];
      filters = {};
      document.querySelectorAll('#view-controls .btn').forEach(b => {
        b.classList.toggle('active', b.dataset.view === v);
      });
      // Segment view uses nested mode at top level
      load({}, v === 'segment');
    }

    // Update stats
    function updateStats() {
      if (!data?.stats) return;
      const { totalValue, totalCount } = data.stats;
      document.getElementById('total-value').textContent = fmtMoney(totalValue);
      document.getElementById('total-count').textContent = fmtNum(totalCount);
      document.getElementById('avg-price').textContent = fmtMoney(totalCount > 0 ? totalValue / totalCount : 0);
    }

    // Update breadcrumb
    function updateBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      const parts = [];

      const rootClick = `load({}, ${view === 'segment' ? 'true' : 'false'})`;
      parts.push(`<a onclick="${rootClick}">${viewRootLabels[view]}</a>`);

      if (view === 'segment') {
        if (filters.segment) {
          if (filters.make) parts.push(`<a onclick="nav({segment:'${esc(filters.segment)}'})">${filters.segment}</a>`);
          else parts.push(`<span class="current">${filters.segment}</span>`);
        }
        if (filters.make) {
          if (filters.model) parts.push(`<a onclick="nav({segment:'${esc(filters.segment)}',make:'${esc(filters.make)}'})">${filters.make}</a>`);
          else parts.push(`<span class="current">${filters.make}</span>`);
        }
        if (filters.model) {
          if (filters.year) parts.push(`<a onclick="nav({segment:'${esc(filters.segment)}',make:'${esc(filters.make)}',model:'${esc(filters.model)}'})">${filters.model}</a>`);
          else parts.push(`<span class="current">${filters.model}</span>`);
        }
        if (filters.year) parts.push(`<span class="current">${filters.year}</span>`);
      } else if (view === 'source') {
        if (filters.source) {
          if (filters.make) parts.push(`<a onclick="nav({source:'${esc(filters.source)}'})">${filters.source}</a>`);
          else parts.push(`<span class="current">${filters.source}</span>`);
        }
        if (filters.make) {
          if (filters.model) parts.push(`<a onclick="nav({source:'${esc(filters.source)}',make:'${esc(filters.make)}'})">${filters.make}</a>`);
          else parts.push(`<span class="current">${filters.make}</span>`);
        }
        if (filters.model) {
          if (filters.year) parts.push(`<a onclick="nav({source:'${esc(filters.source)}',make:'${esc(filters.make)}',model:'${esc(filters.model)}'})">${filters.model}</a>`);
          else parts.push(`<span class="current">${filters.model}</span>`);
        }
        if (filters.year) parts.push(`<span class="current">${filters.year}</span>`);
      } else if (view === 'brand') {
        if (filters.make) {
          if (filters.model) parts.push(`<a onclick="nav({make:'${esc(filters.make)}'})">${filters.make}</a>`);
          else parts.push(`<span class="current">${filters.make}</span>`);
        }
        if (filters.model) {
          if (filters.year) parts.push(`<a onclick="nav({make:'${esc(filters.make)}',model:'${esc(filters.model)}'})">${filters.model}</a>`);
          else parts.push(`<span class="current">${filters.model}</span>`);
        }
        if (filters.year) parts.push(`<span class="current">${filters.year}</span>`);
      }

      const backHtml = history.length ? '<a onclick="back()" style="margin-right:6px;font-size:11px;">&#8592;</a>' : '';
      bc.innerHTML = backHtml + parts.join('<span class="sep">&rsaquo;</span>');
    }

    function esc(s) { return (s || '').replace(/'/g, "\\'"); }

    // Main render
    function render() {
      document.getElementById('loading').style.display = 'none';
      updateStats();
      updateBreadcrumb();
      if (!data) return;

      const container = document.getElementById('treemap-container');
      const root = document.getElementById('treemap-root');
      root.innerHTML = '';

      const rect = container.getBoundingClientRect();
      if (rect.height < 50) { setTimeout(render, 50); return; }
      const W = Math.floor(rect.width);
      const H = Math.floor(rect.height);
      root.style.width = W + 'px';
      root.style.height = H + 'px';

      // Decide render mode: nested (2-level) or flat
      if (nestedData && nestedData.children && nestedData.children.length > 0) {
        renderNested(root, nestedData, W, H);
      } else if (data.hierarchy && data.hierarchy.children) {
        renderFlat(root, data.hierarchy, W, H);
      }
    }

    // Get metric value for sizing
    function metricVal(d) {
      if (metric === 'count') return d.count || 0;
      if (metric === 'avg') return d.count > 0 ? (d.value || 0) / d.count : 0;
      return d.value || 0;
    }

    // Get display value
    function displayVal(d) {
      if (metric === 'count') return fmtNum(d.count || 0);
      if (metric === 'avg') return fmtMoney(d.count > 0 ? (d.value || 0) / d.count : 0);
      return fmtMoney(d.value || 0);
    }

    // NESTED TREEMAP: parent groups with children inside
    function renderNested(container, hierarchyData, W, H) {
      const children = (hierarchyData.children || []).filter(c => metricVal(c) > 0);
      if (children.length === 0) return;

      // Store parent totals for tooltip
      const grandTotal = children.reduce((s, c) => s + metricVal(c), 0);
      parentTotals = {};
      children.forEach(c => {
        parentTotals[c.name] = metricVal(c);
        (c.children || []).forEach(cc => {
          parentTotals[cc.name + '::' + c.name] = metricVal(c);
        });
      });

      // Build hierarchy for D3 layout
      const treeData = {
        name: 'root',
        children: children.map(group => ({
          ...group,
          children: groupChildren(group.children || [], group)
        }))
      };

      const root = d3.hierarchy(treeData)
        .sum(d => d.children ? 0 : Math.sqrt(metricVal(d)))
        .sort((a, b) => b.value - a.value);

      d3.treemap()
        .tile(d3.treemapSquarify.ratio(1.2))
        .size([W, H])
        .paddingTop(18)
        .paddingInner(2)
        .paddingOuter(2)
        .round(true)(root);

      // Render groups (depth 1) and leaves (depth 2)
      for (const group of root.children || []) {
        const gx = group.x0, gy = group.y0;
        const gw = group.x1 - group.x0, gh = group.y1 - group.y0;
        if (gw < 2 || gh < 2) continue;

        // Group container
        const gDiv = document.createElement('div');
        gDiv.className = 'tm-group';
        gDiv.style.cssText = `left:${gx}px;top:${gy}px;width:${gw}px;height:${gh}px;`;

        // Group label
        const label = document.createElement('div');
        label.className = 'tm-group-label';
        const labelText = gw > 60 ? group.data.name : group.data.name.slice(0, Math.floor(gw / 6));
        label.innerHTML = `${labelText}<span class="group-value">${displayVal(group.data)}</span>`;
        gDiv.appendChild(label);

        // Render child leaves inside group
        for (const leaf of group.children || []) {
          const lx = leaf.x0 - gx, ly = leaf.y0 - gy;
          const lw = leaf.x1 - leaf.x0, lh = leaf.y1 - leaf.y0;
          if (lw < 2 || lh < 2) continue;

          const lDiv = document.createElement('div');
          lDiv.className = 'tm-leaf' + (leaf.data._isOthers ? ' others' : '');
          lDiv.style.cssText = `left:${lx}px;top:${ly}px;width:${lw}px;height:${lh}px;`;

          const inner = document.createElement('div');
          inner.className = 'tm-leaf-inner';

          if (lw > 28 && lh > 14) {
            const nameEl = document.createElement('div');
            nameEl.className = 'tm-leaf-name';
            const maxChars = Math.floor((lw - 6) / 5);
            const name = leaf.data.name;
            nameEl.textContent = name.length > maxChars ? name.slice(0, maxChars) + '...' : name;
            inner.appendChild(nameEl);
          }

          if (lw > 35 && lh > 26) {
            const valEl = document.createElement('div');
            valEl.className = 'tm-leaf-value';
            valEl.textContent = displayVal(leaf.data);
            inner.appendChild(valEl);
          }

          if (lw > 40 && lh > 38) {
            const countEl = document.createElement('div');
            countEl.className = 'tm-leaf-count';
            countEl.textContent = fmtNum(leaf.data.count || 0) + ' vehicles';
            inner.appendChild(countEl);
          }

          lDiv.appendChild(inner);

          // Events
          lDiv.addEventListener('mouseover', e => showTip(e, leaf.data, group.data.name, grandTotal));
          lDiv.addEventListener('mousemove', moveTip);
          lDiv.addEventListener('mouseout', hideTip);
          lDiv.addEventListener('click', () => clickNested(leaf.data, group.data));

          gDiv.appendChild(lDiv);
        }

        // Click on group background = drill into group
        gDiv.addEventListener('click', (e) => {
          if (e.target === gDiv || e.target === label) {
            clickGroup(group.data);
          }
        });
        gDiv.style.cursor = 'pointer';

        container.appendChild(gDiv);
      }
    }

    // Group children with "+N others" logic
    function groupChildren(children, parent) {
      if (!children || children.length === 0) return [{ ...parent, _leaf: true }];

      const sorted = [...children].sort((a, b) => metricVal(b) - metricVal(a));
      const filtered = sorted.filter(c => metricVal(c) > 0);

      if (filtered.length <= MAX_CHILDREN) return filtered;

      const top = filtered.slice(0, MAX_CHILDREN - 1);
      const rest = filtered.slice(MAX_CHILDREN - 1);
      const othersValue = rest.reduce((s, c) => s + (c.value || 0), 0);
      const othersCount = rest.reduce((s, c) => s + (c.count || 0), 0);

      top.push({
        name: `+${rest.length} others`,
        value: othersValue,
        count: othersCount,
        _isOthers: true,
        _parentName: parent.name,
        _othersData: rest
      });

      return top;
    }

    // FLAT TREEMAP: single-level rendering for drill-down
    function renderFlat(container, hierarchyData, W, H) {
      let children = (hierarchyData.children || []).filter(c => metricVal(c) > 0);
      if (children.length === 0) return;

      const totalVal = children.reduce((s, c) => s + metricVal(c), 0);

      // Apply "+N others" grouping
      const sorted = [...children].sort((a, b) => metricVal(b) - metricVal(a));
      if (sorted.length > MAX_CHILDREN) {
        const top = sorted.slice(0, MAX_CHILDREN - 1);
        const rest = sorted.slice(MAX_CHILDREN - 1);
        top.push({
          name: `+${rest.length} others`,
          value: rest.reduce((s, c) => s + (c.value || 0), 0),
          count: rest.reduce((s, c) => s + (c.count || 0), 0),
          _isOthers: true
        });
        children = top;
      }

      const treeData = { name: 'root', children };
      const root = d3.hierarchy(treeData)
        .sum(d => d.children ? 0 : Math.sqrt(metricVal(d)))
        .sort((a, b) => b.value - a.value);

      d3.treemap()
        .tile(d3.treemapSquarify.ratio(1))
        .size([W, H])
        .paddingOuter(2)
        .paddingInner(2)
        .round(true)(root);

      for (const leaf of root.leaves()) {
        const x = leaf.x0, y = leaf.y0;
        const w = leaf.x1 - leaf.x0, h = leaf.y1 - leaf.y0;
        if (w < 2 || h < 2) continue;

        const div = document.createElement('div');
        div.className = 'tm-flat' + (leaf.data._isOthers ? ' others' : '');
        div.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;

        const inner = document.createElement('div');
        inner.className = 'tm-leaf-inner';

        if (w > 28 && h > 14) {
          const nameEl = document.createElement('div');
          nameEl.className = 'tm-leaf-name';
          const maxChars = Math.floor((w - 6) / 5);
          const name = leaf.data.name;
          nameEl.textContent = name.length > maxChars ? name.slice(0, maxChars) + '...' : name;
          inner.appendChild(nameEl);
        }

        if (w > 35 && h > 26) {
          const valEl = document.createElement('div');
          valEl.className = 'tm-leaf-value';
          valEl.textContent = displayVal(leaf.data);
          inner.appendChild(valEl);
        }

        if (w > 40 && h > 38) {
          const countEl = document.createElement('div');
          countEl.className = 'tm-leaf-count';
          if (leaf.data.isVehicle) {
            countEl.textContent = fmtMoney(leaf.data.value);
          } else {
            countEl.textContent = fmtNum(leaf.data.count || 0) + ' vehicles';
          }
          inner.appendChild(countEl);
        }

        div.appendChild(inner);

        // Tooltip
        div.addEventListener('mouseover', e => showTipFlat(e, leaf.data, totalVal));
        div.addEventListener('mousemove', moveTip);
        div.addEventListener('mouseout', hideTip);
        div.addEventListener('click', () => clickFlat(leaf.data));

        container.appendChild(div);
      }
    }

    // Click handlers
    function clickNested(leafData, groupData) {
      if (leafData._isOthers) {
        // Drill into the parent group
        clickGroup(groupData);
        return;
      }
      // Drill: group is a segment, leaf is a make
      if (view === 'segment') {
        nav({ segment: groupData.name, make: leafData.name });
      } else if (view === 'brand') {
        nav({ make: groupData.name, model: leafData.name });
      }
    }

    function clickGroup(groupData) {
      if (view === 'segment') {
        nav({ segment: groupData.name });
      } else if (view === 'brand') {
        nav({ make: groupData.name });
      }
    }

    function clickFlat(d) {
      if (d._isOthers) return; // no drill for "+N others" in flat mode
      if (d.isVehicle) {
        window.open('/vehicle/' + d.id, '_blank');
        return;
      }
      const lvl = data?.stats?.level;
      if (view === 'segment') {
        if (lvl === 'segments') nav({ segment: d.name }, true);
        else if (lvl === 'makes') nav({ ...filters, make: d.name });
        else if (lvl === 'models') nav({ ...filters, model: d.name });
        else if (lvl === 'years') nav({ ...filters, year: d.name });
      } else if (view === 'source') {
        if (lvl === 'sources') nav({ source: d.name });
        else if (lvl === 'makes') nav({ ...filters, make: d.name });
        else if (lvl === 'models') nav({ ...filters, model: d.name });
        else if (lvl === 'years') nav({ ...filters, year: d.name });
      } else if (view === 'brand') {
        if (lvl === 'brands') nav({ make: d.name });
        else if (lvl === 'models') nav({ ...filters, model: d.name });
        else if (lvl === 'years') nav({ ...filters, year: d.name });
      }
    }

    // Tooltip (nested mode)
    function showTip(e, d, parentName, grandTotal) {
      const tt = document.getElementById('tooltip');
      const pctTotal = grandTotal > 0 ? ((metricVal(d) / grandTotal) * 100).toFixed(1) : '0.0';
      const parentVal = parentTotals[d.name + '::' + parentName] || parentTotals[parentName] || grandTotal;
      const pctParent = parentVal > 0 ? ((metricVal(d) / parentVal) * 100).toFixed(1) : '0.0';
      const avg = d.count > 0 ? d.value / d.count : 0;

      let val;
      if (metric === 'count') val = fmtNum(d.count || 0) + ' vehicles';
      else if (metric === 'avg') val = fmtMoney(avg);
      else val = fmtMoney(d.value || 0);

      tt.querySelector('.tooltip-name').textContent = d.name;
      tt.querySelector('.tooltip-value').textContent = val;
      tt.querySelector('.tooltip-stats').innerHTML = `
        <div class="tooltip-row"><span class="pct">${pctTotal}%</span><span class="label">of Total</span></div>
        <div class="tooltip-row"><span class="pct">${pctParent}%</span><span class="label">of ${parentName}</span></div>
        <div class="tooltip-row"><span class="pct">${fmtNum(d.count || 0)}</span><span class="label">vehicles</span></div>
        <div class="tooltip-row"><span class="pct">${fmtMoney(avg)}</span><span class="label">avg price</span></div>
      `;
      tt.classList.add('visible');
    }

    // Tooltip (flat mode)
    function showTipFlat(e, d, totalVal) {
      const tt = document.getElementById('tooltip');
      const pct = totalVal > 0 ? ((metricVal(d) / totalVal) * 100).toFixed(1) : '0.0';
      const avg = d.count > 0 ? (d.value || 0) / d.count : 0;

      let val;
      if (metric === 'count') val = fmtNum(d.count || 0) + ' vehicles';
      else if (metric === 'avg') val = fmtMoney(avg);
      else val = fmtMoney(d.value || 0);

      tt.querySelector('.tooltip-name').textContent = d.fullName || d.name;
      tt.querySelector('.tooltip-value').textContent = val;
      tt.querySelector('.tooltip-stats').innerHTML = `
        <div class="tooltip-row"><span class="pct">${pct}%</span><span class="label">of total</span></div>
        <div class="tooltip-row"><span class="pct">${fmtNum(d.count || 0)}</span><span class="label">vehicles</span></div>
        <div class="tooltip-row"><span class="pct">${fmtMoney(d.value || 0)}</span><span class="label">value</span></div>
        <div class="tooltip-row"><span class="pct">${fmtMoney(avg)}</span><span class="label">avg price</span></div>
      `;
      tt.classList.add('visible');
    }

    function moveTip(e) {
      const tt = document.getElementById('tooltip');
      const r = tt.getBoundingClientRect();
      const x = Math.min(e.clientX + 12, window.innerWidth - r.width - 10);
      const y = Math.min(e.clientY + 12, window.innerHeight - r.height - 10);
      tt.style.left = x + 'px';
      tt.style.top = y + 'px';
    }

    function hideTip() {
      document.getElementById('tooltip').classList.remove('visible');
    }

    // Event listeners
    document.querySelectorAll('#view-controls .btn').forEach(b => {
      b.addEventListener('click', () => setView(b.dataset.view));
    });

    document.querySelectorAll('.btn[data-metric]').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.btn[data-metric]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        metric = b.dataset.metric;
        render();
      });
    });

    // Resize
    const resizeObserver = new ResizeObserver(() => {
      if (data) requestAnimationFrame(render);
    });
    resizeObserver.observe(document.getElementById('treemap-container'));

    // Initial load - segment view with nested data
    load({}, true);
  </script>
</body>
</html>
