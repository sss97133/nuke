<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxe Fleet — Saint-Barth</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
  #map { width: 100%; height: 100%; background: #0a0a12; }

  /* Entity markers */
  .entity-marker {
    border-radius: 50%;
    border: 2px solid;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .entity-marker:hover { transform: scale(1.4); }
  .entity-marker.tier-1 { width: 14px; height: 14px; }
  .entity-marker.tier-2 { width: 10px; height: 10px; }
  .entity-marker.tier-3 { width: 6px; height: 6px; opacity: 0.6; }

  /* no pulse — calm dots */

  /* Entity labels */
  .entity-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    white-space: nowrap;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.7);
    pointer-events: none;
    opacity: 0.8;
  }
  .entity-label.tier-3 { display: none; }

  /* Ford emblem */
  .ford-emblem {
    width: 28px;
    height: 18px;
    transition: none;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.8));
    pointer-events: none;
    z-index: 900;
  }

  /* Emoji eruption — gentle float */
  .emoji-particle {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    will-change: transform, opacity;
    animation: gentle-rise var(--dur) ease-out forwards;
    animation-delay: var(--delay);
    opacity: 0;
  }

  @keyframes gentle-rise {
    0% {
      transform: translate(0, 0) scale(0.5);
      opacity: 0;
    }
    15% {
      opacity: 0.9;
    }
    60% {
      opacity: 0.7;
    }
    100% {
      transform: translate(var(--dx), var(--dy)) scale(0.9);
      opacity: 0;
    }
  }

  /* Info panel */
  .info-panel {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    max-width: 380px;
    background: rgba(10, 10, 18, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 16px 20px;
    color: #fff;
    font-size: 12px;
    z-index: 800;
    display: none;
    line-height: 1.5;
  }
  .info-panel .name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .info-panel .category {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 8px;
  }
  .info-panel .logo-preview {
    max-height: 30px;
    max-width: 120px;
    margin-bottom: 8px;
    filter: brightness(10);
    opacity: 0.7;
  }

  /* Title overlay */
  .title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 20px;
    background: linear-gradient(180deg, rgba(10,10,18,0.8) 0%, transparent 100%);
    z-index: 700;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .title-bar .brand {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .title-bar .sub {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  /* Legend */
  .legend {
    position: fixed;
    top: 50px;
    right: 16px;
    z-index: 700;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid;
    flex-shrink: 0;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #0a0a12; }
  .leaflet-control-zoom { display: none; }
  .leaflet-control-attribution { display: none; }
</style>
</head>

// ============================================================

function buildPatrolRoutes() {
  const routeDefs = [
    // Route 1: Flamands → Colombier (NW coast, passes Cheval Blanc)
    ['Route de Flamands', 'Route de Colombier'],
    // Route 2: Saint-Jean corridor (central, passes Airport, Eden Rock, FBM, Nikki Beach)
    ['Route de Saint-Jean'],
    // Route 3: Grand Fond → Toiny → Grand Cul-de-Sac (east/south coast)
    ['Route de Grand Fond', 'Route de Toiny', 'Route de Grand-Cul-de-Sac'],
    // Route 4: Gustavia streets (downtown, passes Fouquet's, L'Officiel, Bagatelle)
    ['Rue de la République', 'Rue August Nyman', 'Route sous le Fort', 'Route du Morne à Divin'],
  ];

  return routeDefs.map(names => {
    const points = [];
    names.forEach(name => {
      const matching = ROADS.filter(r => r.n === name);
      matching.forEach(road => {
        road.c.forEach(pt => points.push([pt[1], pt[0]])); // [lat, lng]
      });
    });
    return points;
  }).filter(route => route.length > 5);
}

// ============================================================
// FORD ANIMATION ENGINE
// ============================================================

const FORD_SPEED = 0.0000008; // ~20 km/h — island cruise, minutes to cross
const PROXIMITY_THRESHOLD = 0.0015; // ~150m
const ERUPTION_COOLDOWN = 30000; // 30s between eruptions per entity

class FordVehicle {
  constructor(route) {
    this.route = route;
    this.routeIndex = 0;
    this.progress = 0; // 0-1 between current and next point
    this.direction = 1; // 1 forward, -1 reverse
    this.marker = L.marker(route[0], { icon: createFordIcon(), zIndexOffset: 500 }).addTo(map);
    this.paused = 0;
  }

  update() {
    if (this.paused > 0) { this.paused--; return; }
    if (this.route.length < 2) return;

    const curr = this.route[this.routeIndex];
    const nextIdx = this.routeIndex + this.direction;

    if (nextIdx < 0 || nextIdx >= this.route.length) {
      this.direction *= -1;
      return;
    }

    const next = this.route[nextIdx];
    const dx = next[1] - curr[1];
    const dy = next[0] - curr[0];
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 0.00001) {
      this.routeIndex = nextIdx;
      return;
    }

    this.progress += FORD_SPEED / dist;

    if (this.progress >= 1) {
      this.progress = 0;
      this.routeIndex = nextIdx;
    }

    const lat = curr[0] + (next[0] - curr[0]) * this.progress;
    const lng = curr[1] + (next[1] - curr[1]) * this.progress;
    this.marker.setLatLng([lat, lng]);

    // Check proximity to entities
    this.checkProximity(lat, lng);
  }

  checkProximity(lat, lng) {
    const now = Date.now();
    entityMarkers.forEach(em => {
      const ent = em.entity;
      if (ent.tier === 3) return; // skip tiny rental dots
      const d = Math.sqrt((lat - ent.lat) ** 2 + (lng - ent.lng) ** 2);
      if (d < PROXIMITY_THRESHOLD && (now - em.lastEruption) > ERUPTION_COOLDOWN) {
        em.lastEruption = now;
        this.paused = 360; // pause ~6s at 60fps — real stop
        triggerEruption(ent);
      }
    });
  }
}

// ============================================================
// EMOJI ERUPTION SYSTEM — FaceTime-style reactions
// ============================================================

function triggerEruption(entity) {
  const point = map.latLngToContainerPoint([entity.lat, entity.lng]);
  const emojis = entity.emojis;
  const count = 6; // gentle, not overwhelming

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'emoji-particle';
    el.textContent = emojis[i % emojis.length];

    const dx = (Math.random() - 0.5) * 100;
    const dy = -(30 + Math.random() * 80);
    const delay = i * 0.15; // staggered, not chaotic
    const dur = 2.5 + Math.random() * 0.5;

    el.style.cssText = `
      left: ${point.x}px;
      top: ${point.y}px;
      --dx: ${dx}px;
      --dy: ${dy}px;
      --delay: ${delay}s;
      --dur: ${dur}s;
      font-size: ${20 + Math.random() * 8}px;
    `;

    document.body.appendChild(el);
    setTimeout(() => el.remove(), (delay + dur) * 1000 + 100);
  }
}

// Plane animation removed — too much noise

// ============================================================
// START ANIMATION
// ============================================================

const patrolRoutes = buildPatrolRoutes();
// Just one Ford — deliberate, not frantic
const fords = patrolRoutes.length > 0 ? [new FordVehicle(patrolRoutes[1] || patrolRoutes[0])] : [];

function animate() {
  fords.forEach(f => f.update());
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

// ============================================================
// ZOOM-DEPENDENT LABEL VISIBILITY
// ============================================================

function updateLabels() {
  const zoom = map.getZoom();
  document.querySelectorAll('.entity-label.tier-2').forEach(el => {
    el.style.display = zoom >= 15 ? 'block' : 'none';
  });
}
map.on('zoomend', updateLabels);
updateLabels();

</script>
