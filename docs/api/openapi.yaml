openapi: 3.0.3
info:
  title: Nuke Vehicle Data API
  description: |
    The Nuke API provides programmatic access to vehicle data management, observations,
    and real-time event notifications via webhooks.

    ## Authentication

    All API requests require authentication using either:

    - **API Key**: Pass via `X-API-Key` header
    - **Bearer Token**: Supabase JWT via `Authorization: Bearer <token>` header

    Get your API key at [https://nuke.ag/settings/api-keys](https://nuke.ag/settings/api-keys)

    ## Rate Limiting

    API requests are rate limited. When you exceed your limit, you'll receive a 429 response.
    Check the `X-RateLimit-Remaining` header to monitor your usage.

    ## Webhooks

    Subscribe to real-time events by creating webhook endpoints. Events are delivered with
    HMAC-SHA256 signatures for verification.
  version: 1.4.0
  contact:
    name: Nuke Support
    url: https://nuke.ag/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://qkgaybvrernstplzjaam.supabase.co/functions/v1
    description: Production API

security:
  - ApiKeyAuth: []
  - BearerAuth: []

tags:
  - name: Vehicles
    description: Vehicle management operations
  - name: Observations
    description: Observation (data point) operations
  - name: Batch
    description: Bulk import operations
  - name: Webhooks
    description: Webhook endpoint management
  - name: Valuations
    description: Vehicle valuation estimates (Nuke Estimates)
  - name: Listings
    description: External auction/marketplace listings
  - name: Comparables
    description: Comparable vehicle sales for valuation context
  - name: VIN Lookup
    description: One-call vehicle profile by VIN
  - name: Vehicle History
    description: Observation timeline for a vehicle
  - name: Vehicle Auction
    description: Auction results, comments, and sentiment
  - name: Market Trends
    description: Price trends by make/model/year
  - name: Search
    description: Full-text search across all entities
  - name: Signal
    description: Market signal scoring — the "is this a good deal?" endpoint. Combines comparable sales, price position, heat score, and auction sentiment into a single 0–100 deal score.
  - name: Vision
    description: |
      Vehicle image classification and analysis powered by YONO — a locally-trained model
      on Nuke's 33M-image corpus. Make classification costs $0.00/image. Full scene analysis
      (category, angle, condition, camera position) uses Gemini/GPT-4o cloud fallback at
      $0.0001–$0.004/image.
  - name: Export
    description: |
      Bulk vehicle data export in CSV, JSON, or NDJSON format. Designed for data scientists,
      ML pipelines, and enterprise customers. Up to 100K rows per request (service role) or
      10K rows (API key) or 5K rows (user JWT).
  - name: Exchange
    description: |
      Market exchange read API — funds, vehicle offerings, and holdings.
      The Nuke market exchange enables fractional vehicle ownership backed by collector vehicle assets.

paths:
  /api-v1-vehicles:
    get:
      tags: [Vehicles]
      summary: List vehicles
      description: Retrieve a paginated list of vehicles you own or have access to.
      operationId: listVehicles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: mine
          in: query
          description: Only return vehicles you own
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of vehicles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VehicleSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Vehicles]
      summary: Create a vehicle
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleInput'
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Vehicle'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api-v1-vehicles/{id}:
    get:
      tags: [Vehicles]
      summary: Retrieve a vehicle
      operationId: getVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vehicle details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Vehicle'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Vehicles]
      summary: Update a vehicle
      operationId: updateVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleInput'
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Vehicle'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Vehicles]
      summary: Archive a vehicle
      description: Soft-deletes the vehicle by setting archived_at timestamp.
      operationId: deleteVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vehicle archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-observations:
    get:
      tags: [Observations]
      summary: List observations
      description: Retrieve observations for a specific vehicle.
      operationId: listObservations
      parameters:
        - name: vehicle_id
          in: query
          schema:
            type: string
            format: uuid
        - name: vin
          in: query
          schema:
            type: string
        - name: kind
          in: query
          description: Filter by observation kind
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: List of observations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Observation'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: vehicle_id or vin required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Observations]
      summary: Create an observation
      description: |
        Record a new observation (data point) for a vehicle. Observations are immutable
        and include full provenance tracking.
      operationId: createObservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObservationInput'
      responses:
        '201':
          description: Observation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Observation'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /api-v1-batch:
    post:
      tags: [Batch]
      summary: Batch import vehicles
      description: |
        Import up to 1000 vehicles in a single request. Optionally include
        observations for each vehicle.
      operationId: batchIngest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
      responses:
        '200':
          description: Batch import completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/BatchResult'
                  summary:
                    type: string
        '400':
          description: Invalid request (e.g., batch too large)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /webhooks-manage:
    get:
      tags: [Webhooks]
      summary: List webhook endpoints
      operationId: listWebhooks
      responses:
        '200':
          description: List of webhook endpoints
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookEndpoint'

    post:
      tags: [Webhooks]
      summary: Create webhook endpoint
      description: |
        Register a new webhook endpoint. The response includes the signing secret
        which will only be shown once - save it immediately.
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookInput'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/WebhookEndpoint'
                      - type: object
                        properties:
                          secret:
                            type: string
                            description: Save this! Won't be shown again.
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /webhooks-manage/{id}:
    get:
      tags: [Webhooks]
      summary: Retrieve webhook endpoint
      operationId: getWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Webhook endpoint with recent deliveries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/WebhookEndpoint'
                      - type: object
                        properties:
                          recent_deliveries:
                            type: array
                            items:
                              $ref: '#/components/schemas/WebhookDelivery'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Webhooks]
      summary: Update webhook endpoint
      operationId: updateWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookUpdateInput'
      responses:
        '200':
          description: Webhook updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WebhookEndpoint'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Webhooks]
      summary: Delete webhook endpoint
      operationId: deleteWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Webhook deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /webhooks-manage/{id}/rotate-secret:
    post:
      tags: [Webhooks]
      summary: Rotate webhook secret
      description: Generate a new signing secret. The old secret will be invalidated immediately.
      operationId: rotateWebhookSecret
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Secret rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/WebhookEndpoint'
                      - type: object
                        properties:
                          secret:
                            type: string
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-signal:
    get:
      tags: [Signal]
      summary: Get market signal score
      description: |
        Returns the market signal score for a vehicle — the "is this a good deal?" answer.

        Combines comparable sales, listing price vs estimated market value, heat score,
        and auction sentiment into a single 0–100 deal score with confidence-weighted
        signal breakdown.

        Requires an existing Nuke Estimate (`nuke_estimates` row). If none exists,
        call `/api-v1-valuations` first to trigger computation.

        **Use cases:**
        - Dealer acquisition tools ("is this worth buying at asking price?")
        - Insurance platforms ("what's the market risk on this vehicle?")
        - Auction bidding tools ("when to bid and when to walk away")
      operationId: getSignalScore
      parameters:
        - name: vehicle_id
          in: query
          description: Vehicle UUID (use this OR vin)
          schema:
            type: string
            format: uuid
        - name: vin
          in: query
          description: 17-character VIN (alternative to vehicle_id)
          schema:
            type: string
            minLength: 17
            maxLength: 17
      responses:
        '200':
          description: Signal score data
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/SignalScore'
              example:
                data:
                  vehicle_id: "b4f2e8a0-1234-4abc-9def-000000000001"
                  deal_score: 87
                  deal_score_label: "strong_buy"
                  heat_score: 72
                  heat_score_label: "hot"
                  estimated_value: 48000
                  value_low: 42000
                  value_high: 55000
                  price_vs_market: -12
                  comp_count: 28
                  signal_weights:
                    comp_coverage: 0.45
                    condition_signal: 0.18
                    auction_sentiment: 0.05
                    listing_velocity: 0.10
                    price_position: 0.10
                  confidence: 0.78
                  model_version: "v1"
                  calculated_at: "2026-02-27T00:00:00Z"
                  is_stale: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No signal score exists for this vehicle yet
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "No signal score available for this vehicle. Run a valuation first."
                  vehicle_id:
                    type: string
                    format: uuid
                  hint:
                    type: string
                    example: "Use nuke.valuations.get() to trigger a valuation, then retry."

  /api-v1-valuations:
    get:
      tags: [Valuations]
      summary: Get vehicle valuation
      description: |
        Returns the Nuke Estimate (valuation) for a vehicle, including confidence scoring,
        deal score, and heat score. Falls back to vehicle pricing fields if no dedicated
        estimate exists.
      operationId: getValuation
      parameters:
        - name: vehicle_id
          in: query
          description: Vehicle UUID
          schema:
            type: string
            format: uuid
        - name: vin
          in: query
          description: Vehicle VIN (alternative to vehicle_id)
          schema:
            type: string
      responses:
        '200':
          description: Valuation data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Valuation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-listings:
    get:
      tags: [Listings]
      summary: List external listings
      description: |
        Returns external auction and marketplace listings for vehicles. Filter by
        vehicle, platform (bat, cars_and_bids, etc.), or listing status.
      operationId: listListings
      parameters:
        - name: vehicle_id
          in: query
          schema:
            type: string
            format: uuid
        - name: vin
          in: query
          schema:
            type: string
        - name: platform
          in: query
          description: Filter by platform
          schema:
            type: string
            enum: [bat, cars_and_bids, pcarmarket, hagerty, rm_sothebys, mecum, gooding, broad_arrow, bonhams]
        - name: status
          in: query
          description: Filter by listing status
          schema:
            type: string
            enum: [active, sold, expired, ended]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated list of external listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExternalListing'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-comps:
    get:
      tags: [Comparables]
      summary: Find comparable sales
      description: |
        Returns comparable vehicle sales for valuation context. Query by year/make/model
        or VIN to find similar sold vehicles, with summary statistics (avg, median, min, max prices).
      operationId: getComps
      parameters:
        - name: make
          in: query
          required: true
          description: Vehicle make (or provide vin)
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: vin
          in: query
          description: Resolve make/model/year from VIN
          schema:
            type: string
        - name: year_range
          in: query
          description: Years +/- from target year to include
          schema:
            type: integer
            default: 3
        - name: min_price
          in: query
          schema:
            type: integer
        - name: max_price
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Comparable sales with summary statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comparable'
                  summary:
                    $ref: '#/components/schemas/CompsSummary'
                  query:
                    type: object
                    properties:
                      make:
                        type: string
                      model:
                        type: string
                        nullable: true
                      year:
                        type: integer
                        nullable: true
                      year_range:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api-v1-vin-lookup/{vin}:
    get:
      tags: [VIN Lookup]
      summary: Look up vehicle by VIN
      description: |
        One-call vehicle profile by VIN. Returns core vehicle fields plus
        embedded valuation, listing/observation/image counts, and first 5 images.
      operationId: vinLookup
      parameters:
        - name: vin
          in: path
          required: true
          description: Vehicle Identification Number
          schema:
            type: string
      responses:
        '200':
          description: Vehicle profile with enrichment data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/VinLookupResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-vehicle-history/{vin}:
    get:
      tags: [Vehicle History]
      summary: Get vehicle observation timeline
      description: |
        Paginated observation timeline for a vehicle by VIN. Each observation
        includes source attribution, kind, structured data, and confidence.
      operationId: getVehicleHistory
      parameters:
        - name: vin
          in: path
          required: true
          description: Vehicle Identification Number
          schema:
            type: string
        - name: kind
          in: query
          description: Filter by observation kind (e.g., listing, comment, sale, service)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Observation timeline
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      vehicle:
                        $ref: '#/components/schemas/VehicleBrief'
                      observations:
                        type: array
                        items:
                          $ref: '#/components/schemas/HistoryObservation'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-vehicle-auction/{vin}:
    get:
      tags: [Vehicle Auction]
      summary: Get auction data for a vehicle
      description: |
        Auction results, bid counts, recent comments, and AI sentiment analysis
        for a vehicle by VIN.
      operationId: getVehicleAuction
      parameters:
        - name: vin
          in: path
          required: true
          description: Vehicle Identification Number
          schema:
            type: string
      responses:
        '200':
          description: Auction data with sentiment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/VehicleAuctionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-market-trends:
    get:
      tags: [Market Trends]
      summary: Get market price trends
      description: |
        Price trends by make/model/year range over a time period. Returns
        time-bucketed statistics including median, percentiles, and volume.
      operationId: getMarketTrends
      parameters:
        - name: make
          in: query
          required: true
          description: Vehicle make (e.g., "Porsche")
          schema:
            type: string
        - name: model
          in: query
          description: Vehicle model (e.g., "911")
          schema:
            type: string
        - name: year_from
          in: query
          schema:
            type: integer
        - name: year_to
          in: query
          schema:
            type: integer
        - name: period
          in: query
          description: Time period for trend analysis
          schema:
            type: string
            enum: [30d, 90d, 1y, 3y]
            default: 90d
      responses:
        '200':
          description: Market trend data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MarketTrendsResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api-v1-search:
    get:
      tags: [Search]
      summary: Search across all entities
      description: |
        Full-text search across vehicles, organizations, users, and tags.
        Auto-detects query type (VIN, URL, year, or free text).
      operationId: searchV1
      parameters:
        - name: q
          in: query
          required: true
          description: Search query — VIN, URL, year, make/model, or free text
          schema:
            type: string
        - name: types
          in: query
          description: Comma-separated entity types to search
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api-v1-vision/classify:
    post:
      tags: [Vision]
      summary: Classify a vehicle image
      description: |
        Classify a vehicle image using YONO — a locally-trained model on Nuke's 33M-image corpus.
        Returns make, family (origin group), confidence, top-5 predictions, and vehicle detection.

        **Cost: $0.00/image.** YONO runs on dedicated inference infrastructure with no cloud AI fees.
      operationId: visionClassify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_url]
              properties:
                image_url:
                  type: string
                  format: uri
                  description: Publicly accessible URL of the vehicle image
                  example: https://cdn.bringatrailer.com/vehicles/porsche-911.jpg
                top_k:
                  type: integer
                  default: 5
                  minimum: 1
                  maximum: 20
                  description: Number of top predictions to return
      responses:
        '200':
          description: Classification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  make:
                    type: string
                    nullable: true
                    description: Best make prediction
                    example: Porsche
                  family:
                    type: string
                    nullable: true
                    description: Vehicle origin group (american, german, japanese, british, italian, french, swedish)
                    example: german
                  family_confidence:
                    type: number
                    format: float
                    nullable: true
                    description: Confidence score for family prediction (0.0–1.0)
                    example: 0.97
                  confidence:
                    type: number
                    format: float
                    description: Make prediction confidence (0.0–1.0)
                    example: 0.91
                  top5:
                    type: array
                    description: Top-K predictions as [make, confidence] pairs
                    items:
                      type: array
                      items:
                        oneOf:
                          - type: string
                          - type: number
                    example: [["Porsche", 0.91], ["BMW", 0.04], ["Mercedes-Benz", 0.02]]
                  is_vehicle:
                    type: boolean
                    description: Whether the image appears to contain a vehicle
                    example: true
                  source:
                    type: string
                    enum: [yono, unavailable]
                    description: Inference source
                    example: yono
                  ms:
                    type: number
                    description: YONO inference time in milliseconds
                    example: 4.2
                  cost_usd:
                    type: number
                    description: Cost in USD (always 0 for YONO)
                    example: 0
                  elapsed_ms:
                    type: number
                    description: Total request time in milliseconds
                    example: 42
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api-v1-vision/analyze:
    post:
      tags: [Vision]
      summary: Analyze a vehicle image
      description: |
        Full vehicle image analysis: YONO make classification + cloud scene analysis.

        Returns make/family (YONO, free), plus category, subject taxonomy, condition notes,
        and camera position (cloud, $0.0001–$0.004/image via Gemini or GPT-4o).

        The `source` field indicates what ran:
        - `yono` — YONO classification only (cloud analysis unavailable)
        - `yono+cloud` — Both YONO + Gemini/GPT-4o analysis
        - `unavailable` — YONO sidecar offline
      operationId: visionAnalyze
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_url]
              properties:
                image_url:
                  type: string
                  format: uri
                  description: Publicly accessible URL of the vehicle image
                  example: https://cdn.bringatrailer.com/vehicles/porsche-911-door.jpg
                vehicle_id:
                  type: string
                  format: uuid
                  description: Optional vehicle ID for context-aware analysis
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                type: object
                properties:
                  make:
                    type: string
                    nullable: true
                    example: Porsche
                  family:
                    type: string
                    nullable: true
                    example: german
                  family_confidence:
                    type: number
                    nullable: true
                    example: 0.97
                  confidence:
                    type: number
                    example: 0.91
                  top5:
                    type: array
                    items:
                      type: array
                      items:
                        oneOf:
                          - type: string
                          - type: number
                  is_vehicle:
                    type: boolean
                    nullable: true
                    example: true
                  category:
                    type: string
                    nullable: true
                    enum: [exterior, interior, engine, undercarriage, document, damage]
                    example: exterior
                  subject:
                    type: string
                    nullable: true
                    description: Subject taxonomy key
                    example: exterior.panel.door.front.driver
                  description:
                    type: string
                    nullable: true
                    description: Human-readable description of what is shown
                    example: Left front door of a Porsche 911 showing minor surface rust on lower sill
                  condition_notes:
                    type: string
                    nullable: true
                    example: Surface rust on lower sill, paint fading on door handle
                  visible_damage:
                    type: boolean
                    nullable: true
                    example: true
                  camera_position:
                    type: object
                    nullable: true
                    properties:
                      azimuth_deg:
                        type: number
                        description: "0=front, 90=driver side, 180=rear, 270=passenger side"
                        example: 90
                      elevation_deg:
                        type: number
                        description: Camera elevation relative to vehicle center
                        example: 15
                      distance_mm:
                        type: number
                        description: Estimated camera distance from vehicle center in mm
                        example: 3500
                      confidence:
                        type: number
                        example: 0.8
                  yono:
                    type: object
                    nullable: true
                    description: YONO classification details
                    properties:
                      make:
                        type: string
                        example: Porsche
                      family:
                        type: string
                        nullable: true
                        example: german
                      confidence:
                        type: number
                        example: 0.91
                      ms:
                        type: number
                        example: 4.2
                  source:
                    type: string
                    enum: [yono, "yono+cloud", unavailable]
                    example: "yono+cloud"
                  cost_usd:
                    type: number
                    example: 0.0001
                  elapsed_ms:
                    type: number
                    example: 1250
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api-v1-vision/batch:
    post:
      tags: [Vision]
      summary: Batch classify vehicle images
      description: |
        Classify up to 100 vehicle images in a single request using YONO.
        All classifications run locally — **cost: $0.00** regardless of batch size.

        Results include per-image make, family, confidence, top-5, and is_vehicle.
        Failed images are included in `results` with an `error` field.
      operationId: visionBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  maxItems: 100
                  description: Array of images to classify
                  items:
                    type: object
                    required: [image_url]
                    properties:
                      image_url:
                        type: string
                        format: uri
                      top_k:
                        type: integer
                        default: 5
                        minimum: 1
                        maximum: 20
      responses:
        '200':
          description: Batch classification results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        image_url:
                          type: string
                        make:
                          type: string
                          nullable: true
                        family:
                          type: string
                          nullable: true
                        family_confidence:
                          type: number
                          nullable: true
                        confidence:
                          type: number
                        top5:
                          type: array
                          items:
                            type: array
                            items:
                              oneOf:
                                - type: string
                                - type: number
                        is_vehicle:
                          type: boolean
                        ms:
                          type: number
                        cost_usd:
                          type: number
                        error:
                          type: string
                          description: Present only if this image failed
                  count:
                    type: integer
                    example: 3
                  errors:
                    type: integer
                    description: Number of images that failed
                    example: 0
                  cost_usd:
                    type: number
                    description: Always 0 for YONO batch
                    example: 0
                  elapsed_ms:
                    type: number
                    example: 142
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api-v1-export:
    get:
      tags: [Export]
      summary: Bulk export vehicle data
      description: |
        Export vehicle records in CSV, JSON, or NDJSON format. Designed for data scientists,
        ML pipelines, and enterprise customers.

        **Row limits by auth tier:**
        - Service role key: 100,000 rows/request
        - API key: 10,000 rows/request
        - User JWT: 5,000 rows/request

        **Cursor pagination:** Use `cursor` (last vehicle `id` from previous response) for
        efficient sequential pagination through large datasets.

        **Partial fields:** Use `fields` to request only the columns you need — reduces
        response size significantly for wide datasets.

        **Parquet:** Not directly supported — export as NDJSON and convert:
        `pd.read_json('data.ndjson', lines=True).to_parquet('data.parquet')`
      operationId: exportVehicles
      parameters:
        - name: format
          in: query
          description: Output format
          schema:
            type: string
            enum: [csv, json, ndjson]
            default: json
        - name: make
          in: query
          description: Filter by make (case-insensitive)
          schema:
            type: string
            example: Porsche
        - name: model
          in: query
          description: Filter by model (case-insensitive)
          schema:
            type: string
            example: "911"
        - name: year_min
          in: query
          description: Minimum model year
          schema:
            type: integer
            example: 1970
        - name: year_max
          in: query
          description: Maximum model year
          schema:
            type: integer
            example: 1989
        - name: fields
          in: query
          description: Comma-separated list of fields to include. Defaults to a standard set.
          schema:
            type: string
            example: id,year,make,model,vin,sale_price,mileage
        - name: limit
          in: query
          description: Maximum rows to return (capped by auth tier)
          schema:
            type: integer
            default: 1000
            maximum: 100000
        - name: cursor
          in: query
          description: Cursor for pagination — vehicle `id` from last response (for sequential exports)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: |
            Vehicle data in requested format.
            - `application/json` — JSON array or wrapped object
            - `text/csv` — RFC 4180 CSV with header row
            - `application/x-ndjson` — one JSON object per line
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      description: Vehicle record with requested fields
                  count:
                    type: integer
                    description: Number of records returned
                  next_cursor:
                    type: string
                    format: uuid
                    nullable: true
                    description: Pass as `cursor` in next request for continuation. Null when exhausted.
                  fields:
                    type: array
                    items:
                      type: string
                    description: Fields included in each record
            text/csv:
              schema:
                type: string
                description: CSV with header row
            application/x-ndjson:
              schema:
                type: string
                description: Newline-delimited JSON (one object per line)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api-v1-exchange:
    get:
      tags: [Exchange]
      summary: Market exchange snapshot
      description: |
        Returns market exchange data — funds, vehicle offerings, and holdings.

        The `action` parameter controls which subset is returned:
        - (none) — full snapshot: all funds + all offerings
        - `funds` — all active market funds with stats
        - `fund` — single fund detail (requires `symbol`)
        - `offerings` — all vehicle offerings currently trading
        - `holdings` — caller's holdings (requires authentication)

        Stats are cached and refreshed every 15 minutes. Use `holdings` action to
        get real-time position data for authenticated users.
      operationId: getExchange
      parameters:
        - name: action
          in: query
          description: What to return. Omit for full snapshot.
          schema:
            type: string
            enum: [funds, fund, offerings, holdings]
        - name: symbol
          in: query
          description: Fund symbol — required when action=fund
          schema:
            type: string
            example: PORS
      responses:
        '200':
          description: Exchange data
          content:
            application/json:
              schema:
                oneOf:
                  - description: Full snapshot (action omitted)
                    type: object
                    properties:
                      funds:
                        type: array
                        items:
                          $ref: '#/components/schemas/MarketFund'
                      offerings:
                        type: array
                        items:
                          $ref: '#/components/schemas/VehicleOffering'
                  - description: Funds list (action=funds)
                    type: object
                    properties:
                      funds:
                        type: array
                        items:
                          $ref: '#/components/schemas/MarketFund'
                  - description: Single fund (action=fund)
                    $ref: '#/components/schemas/MarketFund'
                  - description: Vehicle offerings (action=offerings)
                    type: object
                    properties:
                      offerings:
                        type: array
                        items:
                          $ref: '#/components/schemas/VehicleOffering'
                  - description: Caller holdings (action=holdings)
                    type: object
                    properties:
                      holdings:
                        type: array
                        items:
                          type: object
                          properties:
                            offering_id:
                              type: string
                              format: uuid
                            shares:
                              type: number
                            value_usd:
                              type: number
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Exchange]
      summary: Market exchange actions (POST)
      description: |
        Same actions as GET but via POST body. Useful for actions with complex parameters
        or where GET query string limits apply.

        Request body mirrors GET query params: `{ "action": "fund", "symbol": "PORS" }`.
      operationId: postExchange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [funds, fund, offerings, holdings]
                symbol:
                  type: string
                  description: Fund symbol (for action=fund)
      responses:
        '200':
          description: Exchange data (same structure as GET)
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key from https://nuke.ag/settings/api-keys
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase session JWT

  schemas:
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        year:
          type: integer
          nullable: true
        make:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        vin:
          type: string
          nullable: true
        mileage:
          type: integer
          nullable: true
        exterior_color:
          type: string
          nullable: true
        interior_color:
          type: string
          nullable: true
        transmission:
          type: string
          nullable: true
        engine:
          type: string
          nullable: true
        drivetrain:
          type: string
          nullable: true
        body_style:
          type: string
          nullable: true
        sale_price:
          type: number
          nullable: true
        description:
          type: string
          nullable: true
        is_public:
          type: boolean
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VehicleSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        year:
          type: integer
          nullable: true
        make:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        vin:
          type: string
          nullable: true
        mileage:
          type: integer
          nullable: true
        exterior_color:
          type: string
          nullable: true
        transmission:
          type: string
          nullable: true
        body_style:
          type: string
          nullable: true
        sale_price:
          type: number
          nullable: true
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time
        owner_id:
          type: string
          format: uuid

    VehicleInput:
      type: object
      properties:
        year:
          type: integer
          minimum: 1886
          maximum: 2100
        make:
          type: string
        model:
          type: string
        vin:
          type: string
        mileage:
          type: integer
          minimum: 0
        exterior_color:
          type: string
        interior_color:
          type: string
        transmission:
          type: string
        engine:
          type: string
        drivetrain:
          type: string
        body_style:
          type: string
        sale_price:
          type: number
        description:
          type: string
        is_public:
          type: boolean

    Observation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vehicle_id:
          type: string
          format: uuid
        vin:
          type: string
          nullable: true
        source_type:
          type: string
        observation_kind:
          type: string
        observed_at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
        provenance:
          type: object
          properties:
            ingested_by:
              type: string
            ingested_via:
              type: string
            url:
              type: string
            document_id:
              type: string
            extracted_by:
              type: string
        created_at:
          type: string
          format: date-time

    ObservationInput:
      type: object
      required:
        - source_type
        - observation_kind
        - data
      properties:
        vehicle_id:
          type: string
          format: uuid
        vin:
          type: string
        source_type:
          type: string
          description: e.g., "manual", "auction", "service_record"
        observation_kind:
          type: string
          description: e.g., "mileage_reading", "sale_result", "condition_report"
        observed_at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
          default: 0.8
        provenance:
          type: object
          properties:
            url:
              type: string
            document_id:
              type: string
            extracted_by:
              type: string

    BatchRequest:
      type: object
      required:
        - vehicles
      properties:
        vehicles:
          type: array
          maxItems: 1000
          items:
            allOf:
              - $ref: '#/components/schemas/VehicleInput'
              - type: object
                properties:
                  observations:
                    type: array
                    items:
                      type: object
                      required:
                        - source_type
                        - observation_kind
                        - data
                      properties:
                        source_type:
                          type: string
                        observation_kind:
                          type: string
                        observed_at:
                          type: string
                          format: date-time
                        data:
                          type: object
                        confidence:
                          type: number
        options:
          type: object
          properties:
            skip_duplicates:
              type: boolean
              default: true
            match_by:
              type: string
              enum: [vin, year_make_model, none]
              default: vin
            update_existing:
              type: boolean
              default: false

    BatchResult:
      type: object
      properties:
        created:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        failed:
          type: integer
        vehicles:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              id:
                type: string
                format: uuid
              status:
                type: string
                enum: [created, updated, skipped, failed]
              error:
                type: string

    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        events:
          type: array
          items:
            type: string
            enum:
              - '*'
              - vehicle.created
              - vehicle.updated
              - vehicle.deleted
              - observation.created
              - document.uploaded
              - import.completed
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        stats:
          type: object
          properties:
            total_deliveries:
              type: integer
            failed_deliveries:
              type: integer

    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
        event_id:
          type: string
        status:
          type: string
          enum: [pending, success, failed, retrying]
        attempts:
          type: integer
        response_status:
          type: integer
          nullable: true
        response_time_ms:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
          nullable: true
        last_error:
          type: string
          nullable: true

    WebhookInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: Must be HTTPS (HTTP allowed for localhost)
        description:
          type: string
        events:
          type: array
          default: ['*']
          items:
            type: string
            enum:
              - '*'
              - vehicle.created
              - vehicle.updated
              - vehicle.deleted
              - observation.created
              - document.uploaded
              - import.completed

    WebhookUpdateInput:
      type: object
      properties:
        url:
          type: string
          format: uri
        description:
          type: string
        events:
          type: array
          items:
            type: string
        is_active:
          type: boolean

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer

    SignalScore:
      type: object
      description: |
        Market signal score — answers "is this a good deal?"
        Combines comparable sales, heat score, pricing position, and auction sentiment.
      properties:
        vehicle_id:
          type: string
          format: uuid
        deal_score:
          type: number
          nullable: true
          minimum: 0
          maximum: 100
          description: Deal score 0–100. Higher is a better deal.
        deal_score_label:
          type: string
          nullable: true
          enum: [strong_buy, buy, hold, pass, overpriced]
          description: |
            Consumer-friendly deal label.
            - strong_buy: Significantly below market
            - buy: Below market
            - hold: At market
            - pass: Above market or insufficient data
            - overpriced: Meaningfully above comparable sales
        heat_score:
          type: number
          nullable: true
          minimum: 0
          maximum: 100
          description: Market demand intensity for this vehicle class.
        heat_score_label:
          type: string
          nullable: true
          enum: [cold, warm, hot, fire, volcanic]
        estimated_value:
          type: number
          nullable: true
          description: Estimated fair market value in USD
        value_low:
          type: number
          nullable: true
          description: Lower bound of value range in USD
        value_high:
          type: number
          nullable: true
          description: Upper bound of value range in USD
        price_vs_market:
          type: number
          nullable: true
          description: |
            How the listing price compares to estimated market value, as a percentage.
            Negative = priced BELOW market (better deal), positive = ABOVE market (overpriced).
            Null if no listing price is available.
          example: -12
        comp_count:
          type: integer
          nullable: true
          description: Number of comparable sales used in the valuation
        signal_weights:
          type: object
          nullable: true
          description: Contribution weights for each signal factor (0.0–1.0)
          properties:
            comp_coverage:
              type: number
              nullable: true
              description: Weight given to comparable sales coverage
            condition_signal:
              type: number
              nullable: true
              description: Weight given to vehicle condition signals
            auction_sentiment:
              type: number
              nullable: true
              description: Weight given to auction comment sentiment
            listing_velocity:
              type: number
              nullable: true
              description: Weight given to market trend / listing velocity
            price_position:
              type: number
              nullable: true
              description: Weight given to bid curve / price position signals
        confidence:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
          description: Confidence score 0.0–1.0
        model_version:
          type: string
          nullable: true
          description: Model version used to compute the score
        calculated_at:
          type: string
          format: date-time
          nullable: true
          description: When the score was last calculated
        is_stale:
          type: boolean
          nullable: true
          description: True if the score is older than the staleness threshold

    Valuation:
      type: object
