openapi: 3.0.3
info:
  title: Nuke Vehicle Data API
  description: |
    The Nuke API provides programmatic access to vehicle data management, observations,
    and real-time event notifications via webhooks.

    ## Authentication

    All API requests require authentication using either:

    - **API Key**: Pass via `X-API-Key` header
    - **Bearer Token**: Supabase JWT via `Authorization: Bearer <token>` header

    Get your API key at [https://nuke.com/settings/api-keys](https://nuke.com/settings/api-keys)

    ## Rate Limiting

    API requests are rate limited. When you exceed your limit, you'll receive a 429 response.
    Check the `X-RateLimit-Remaining` header to monitor your usage.

    ## Webhooks

    Subscribe to real-time events by creating webhook endpoints. Events are delivered with
    HMAC-SHA256 signatures for verification.
  version: 1.0.0
  contact:
    name: Nuke Support
    url: https://nuke.com/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://qkgaybvrernstplzjaam.supabase.co/functions/v1
    description: Production API

security:
  - ApiKeyAuth: []
  - BearerAuth: []

tags:
  - name: Vehicles
    description: Vehicle management operations
  - name: Observations
    description: Observation (data point) operations
  - name: Batch
    description: Bulk import operations
  - name: Webhooks
    description: Webhook endpoint management
  - name: Valuations
    description: Vehicle valuation estimates (Nuke Estimates)
  - name: Listings
    description: External auction/marketplace listings
  - name: Comparables
    description: Comparable vehicle sales for valuation context
  - name: VIN Lookup
    description: One-call vehicle profile by VIN
  - name: Vehicle History
    description: Observation timeline for a vehicle
  - name: Vehicle Auction
    description: Auction results, comments, and sentiment
  - name: Market Trends
    description: Price trends by make/model/year
  - name: Search
    description: Full-text search across all entities

paths:
  /api-v1-vehicles:
    get:
      tags: [Vehicles]
      summary: List vehicles
      description: Retrieve a paginated list of vehicles you own or have access to.
      operationId: listVehicles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: mine
          in: query
          description: Only return vehicles you own
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of vehicles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VehicleSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Vehicles]
      summary: Create a vehicle
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleInput'
      responses:
        '201':
          description: Vehicle created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Vehicle'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api-v1-vehicles/{id}:
    get:
      tags: [Vehicles]
      summary: Retrieve a vehicle
      operationId: getVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vehicle details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Vehicle'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Vehicles]
      summary: Update a vehicle
      operationId: updateVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleInput'
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Vehicle'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Vehicles]
      summary: Archive a vehicle
      description: Soft-deletes the vehicle by setting archived_at timestamp.
      operationId: deleteVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vehicle archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-observations:
    get:
      tags: [Observations]
      summary: List observations
      description: Retrieve observations for a specific vehicle.
      operationId: listObservations
      parameters:
        - name: vehicle_id
          in: query
          schema:
            type: string
            format: uuid
        - name: vin
          in: query
          schema:
            type: string
        - name: kind
          in: query
          description: Filter by observation kind
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: List of observations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Observation'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: vehicle_id or vin required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Observations]
      summary: Create an observation
      description: |
        Record a new observation (data point) for a vehicle. Observations are immutable
        and include full provenance tracking.
      operationId: createObservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObservationInput'
      responses:
        '201':
          description: Observation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Observation'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /api-v1-batch:
    post:
      tags: [Batch]
      summary: Batch import vehicles
      description: |
        Import up to 1000 vehicles in a single request. Optionally include
        observations for each vehicle.
      operationId: batchIngest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
      responses:
        '200':
          description: Batch import completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    $ref: '#/components/schemas/BatchResult'
                  summary:
                    type: string
        '400':
          description: Invalid request (e.g., batch too large)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /webhooks-manage:
    get:
      tags: [Webhooks]
      summary: List webhook endpoints
      operationId: listWebhooks
      responses:
        '200':
          description: List of webhook endpoints
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookEndpoint'

    post:
      tags: [Webhooks]
      summary: Create webhook endpoint
      description: |
        Register a new webhook endpoint. The response includes the signing secret
        which will only be shown once - save it immediately.
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookInput'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/WebhookEndpoint'
                      - type: object
                        properties:
                          secret:
                            type: string
                            description: Save this! Won't be shown again.
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /webhooks-manage/{id}:
    get:
      tags: [Webhooks]
      summary: Retrieve webhook endpoint
      operationId: getWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Webhook endpoint with recent deliveries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/WebhookEndpoint'
                      - type: object
                        properties:
                          recent_deliveries:
                            type: array
                            items:
                              $ref: '#/components/schemas/WebhookDelivery'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Webhooks]
      summary: Update webhook endpoint
      operationId: updateWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookUpdateInput'
      responses:
        '200':
          description: Webhook updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WebhookEndpoint'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Webhooks]
      summary: Delete webhook endpoint
      operationId: deleteWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Webhook deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /webhooks-manage/{id}/rotate-secret:
    post:
      tags: [Webhooks]
      summary: Rotate webhook secret
      description: Generate a new signing secret. The old secret will be invalidated immediately.
      operationId: rotateWebhookSecret
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Secret rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/WebhookEndpoint'
                      - type: object
                        properties:
                          secret:
                            type: string
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-valuations:
    get:
      tags: [Valuations]
      summary: Get vehicle valuation
      description: |
        Returns the Nuke Estimate (valuation) for a vehicle, including confidence scoring,
        deal score, and heat score. Falls back to vehicle pricing fields if no dedicated
        estimate exists.
      operationId: getValuation
      parameters:
        - name: vehicle_id
          in: query
          description: Vehicle UUID
          schema:
            type: string
            format: uuid
        - name: vin
          in: query
          description: Vehicle VIN (alternative to vehicle_id)
          schema:
            type: string
      responses:
        '200':
          description: Valuation data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Valuation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-listings:
    get:
      tags: [Listings]
      summary: List external listings
      description: |
        Returns external auction and marketplace listings for vehicles. Filter by
        vehicle, platform (bat, cars_and_bids, etc.), or listing status.
      operationId: listListings
      parameters:
        - name: vehicle_id
          in: query
          schema:
            type: string
            format: uuid
        - name: vin
          in: query
          schema:
            type: string
        - name: platform
          in: query
          description: Filter by platform
          schema:
            type: string
            enum: [bat, cars_and_bids, pcarmarket, hagerty, rm_sothebys, mecum, gooding, broad_arrow, bonhams]
        - name: status
          in: query
          description: Filter by listing status
          schema:
            type: string
            enum: [active, sold, expired, ended]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated list of external listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExternalListing'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-comps:
    get:
      tags: [Comparables]
      summary: Find comparable sales
      description: |
        Returns comparable vehicle sales for valuation context. Query by year/make/model
        or VIN to find similar sold vehicles, with summary statistics (avg, median, min, max prices).
      operationId: getComps
      parameters:
        - name: make
          in: query
          required: true
          description: Vehicle make (or provide vin)
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: vin
          in: query
          description: Resolve make/model/year from VIN
          schema:
            type: string
        - name: year_range
          in: query
          description: Years +/- from target year to include
          schema:
            type: integer
            default: 3
        - name: min_price
          in: query
          schema:
            type: integer
        - name: max_price
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Comparable sales with summary statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comparable'
                  summary:
                    $ref: '#/components/schemas/CompsSummary'
                  query:
                    type: object
                    properties:
                      make:
                        type: string
                      model:
                        type: string
                        nullable: true
                      year:
                        type: integer
                        nullable: true
                      year_range:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api-v1-vin-lookup/{vin}:
    get:
      tags: [VIN Lookup]
      summary: Look up vehicle by VIN
      description: |
        One-call vehicle profile by VIN. Returns core vehicle fields plus
        embedded valuation, listing/observation/image counts, and first 5 images.
      operationId: vinLookup
      parameters:
        - name: vin
          in: path
          required: true
          description: Vehicle Identification Number
          schema:
            type: string
      responses:
        '200':
          description: Vehicle profile with enrichment data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/VinLookupResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-vehicle-history/{vin}:
    get:
      tags: [Vehicle History]
      summary: Get vehicle observation timeline
      description: |
        Paginated observation timeline for a vehicle by VIN. Each observation
        includes source attribution, kind, structured data, and confidence.
      operationId: getVehicleHistory
      parameters:
        - name: vin
          in: path
          required: true
          description: Vehicle Identification Number
          schema:
            type: string
        - name: kind
          in: query
          description: Filter by observation kind (e.g., listing, comment, sale, service)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Observation timeline
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      vehicle:
                        $ref: '#/components/schemas/VehicleBrief'
                      observations:
                        type: array
                        items:
                          $ref: '#/components/schemas/HistoryObservation'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-vehicle-auction/{vin}:
    get:
      tags: [Vehicle Auction]
      summary: Get auction data for a vehicle
      description: |
        Auction results, bid counts, recent comments, and AI sentiment analysis
        for a vehicle by VIN.
      operationId: getVehicleAuction
      parameters:
        - name: vin
          in: path
          required: true
          description: Vehicle Identification Number
          schema:
            type: string
      responses:
        '200':
          description: Auction data with sentiment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/VehicleAuctionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-v1-market-trends:
    get:
      tags: [Market Trends]
      summary: Get market price trends
      description: |
        Price trends by make/model/year range over a time period. Returns
        time-bucketed statistics including median, percentiles, and volume.
      operationId: getMarketTrends
      parameters:
        - name: make
          in: query
          required: true
          description: Vehicle make (e.g., "Porsche")
          schema:
            type: string
        - name: model
          in: query
          description: Vehicle model (e.g., "911")
          schema:
            type: string
        - name: year_from
          in: query
          schema:
            type: integer
        - name: year_to
          in: query
          schema:
            type: integer
        - name: period
          in: query
          description: Time period for trend analysis
          schema:
            type: string
            enum: [30d, 90d, 1y, 3y]
            default: 90d
      responses:
        '200':
          description: Market trend data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MarketTrendsResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api-v1-search:
    get:
      tags: [Search]
      summary: Search across all entities
      description: |
        Full-text search across vehicles, organizations, users, and tags.
        Auto-detects query type (VIN, URL, year, or free text).
      operationId: searchV1
      parameters:
        - name: q
          in: query
          required: true
          description: Search query — VIN, URL, year, make/model, or free text
          schema:
            type: string
        - name: types
          in: query
          description: Comma-separated entity types to search
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key from https://nuke.com/settings/api-keys
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase session JWT

  schemas:
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        year:
          type: integer
          nullable: true
        make:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        vin:
          type: string
          nullable: true
        mileage:
          type: integer
          nullable: true
        exterior_color:
          type: string
          nullable: true
        interior_color:
          type: string
          nullable: true
        transmission:
          type: string
          nullable: true
        engine:
          type: string
          nullable: true
        drivetrain:
          type: string
          nullable: true
        body_style:
          type: string
          nullable: true
        sale_price:
          type: number
          nullable: true
        description:
          type: string
          nullable: true
        is_public:
          type: boolean
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VehicleSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        year:
          type: integer
          nullable: true
        make:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        vin:
          type: string
          nullable: true
        mileage:
          type: integer
          nullable: true
        exterior_color:
          type: string
          nullable: true
        transmission:
          type: string
          nullable: true
        body_style:
          type: string
          nullable: true
        sale_price:
          type: number
          nullable: true
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time
        owner_id:
          type: string
          format: uuid

    VehicleInput:
      type: object
      properties:
        year:
          type: integer
          minimum: 1886
          maximum: 2100
        make:
          type: string
        model:
          type: string
        vin:
          type: string
        mileage:
          type: integer
          minimum: 0
        exterior_color:
          type: string
        interior_color:
          type: string
        transmission:
          type: string
        engine:
          type: string
        drivetrain:
          type: string
        body_style:
          type: string
        sale_price:
          type: number
        description:
          type: string
        is_public:
          type: boolean

    Observation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vehicle_id:
          type: string
          format: uuid
        vin:
          type: string
          nullable: true
        source_type:
          type: string
        observation_kind:
          type: string
        observed_at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
        provenance:
          type: object
          properties:
            ingested_by:
              type: string
            ingested_via:
              type: string
            url:
              type: string
            document_id:
              type: string
            extracted_by:
              type: string
        created_at:
          type: string
          format: date-time

    ObservationInput:
      type: object
      required:
        - source_type
        - observation_kind
        - data
      properties:
        vehicle_id:
          type: string
          format: uuid
        vin:
          type: string
        source_type:
          type: string
          description: e.g., "manual", "auction", "service_record"
        observation_kind:
          type: string
          description: e.g., "mileage_reading", "sale_result", "condition_report"
        observed_at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
          default: 0.8
        provenance:
          type: object
          properties:
            url:
              type: string
            document_id:
              type: string
            extracted_by:
              type: string

    BatchRequest:
      type: object
      required:
        - vehicles
      properties:
        vehicles:
          type: array
          maxItems: 1000
          items:
            allOf:
              - $ref: '#/components/schemas/VehicleInput'
              - type: object
                properties:
                  observations:
                    type: array
                    items:
                      type: object
                      required:
                        - source_type
                        - observation_kind
                        - data
                      properties:
                        source_type:
                          type: string
                        observation_kind:
                          type: string
                        observed_at:
                          type: string
                          format: date-time
                        data:
                          type: object
                        confidence:
                          type: number
        options:
          type: object
          properties:
            skip_duplicates:
              type: boolean
              default: true
            match_by:
              type: string
              enum: [vin, year_make_model, none]
              default: vin
            update_existing:
              type: boolean
              default: false

    BatchResult:
      type: object
      properties:
        created:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        failed:
          type: integer
        vehicles:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              id:
                type: string
                format: uuid
              status:
                type: string
                enum: [created, updated, skipped, failed]
              error:
                type: string

    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        events:
          type: array
          items:
            type: string
            enum:
              - '*'
              - vehicle.created
              - vehicle.updated
              - vehicle.deleted
              - observation.created
              - document.uploaded
              - import.completed
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        stats:
          type: object
          properties:
            total_deliveries:
              type: integer
            failed_deliveries:
              type: integer

    WebhookDelivery:
