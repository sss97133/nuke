          type: string
        event_id:
          type: string
        status:
          type: string
          enum: [pending, success, failed, retrying]
        attempts:
          type: integer
        response_status:
          type: integer
          nullable: true
        response_time_ms:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
          nullable: true
        last_error:
          type: string
          nullable: true

    WebhookInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: Must be HTTPS (HTTP allowed for localhost)
        description:
          type: string
        events:
          type: array
          default: ['*']
          items:
            type: string
            enum:
              - '*'
              - vehicle.created
              - vehicle.updated
              - vehicle.deleted
              - observation.created
              - document.uploaded
              - import.completed

    WebhookUpdateInput:
