<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <title>I-01 Thermistor (NTC)</title>
  <desc>Thermistor/temperature sensor symbol. Resistor zigzag inside a circle with temperature indicator. Used for coolant temp sensor (ECU), intake air temp sensor, and oil temp sensor. 6mm diameter per spec.</desc>

  <!-- Sensor circle -->
  <circle cx="20" cy="20" r="12" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- Resistor zigzag inside -->
  <polyline points="12,20 14,16 16,24 18,16 20,24 22,16 24,24 26,16 28,20" fill="none" stroke="black" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Temperature indicator (T with degree symbol) -->
  <text x="20" y="30" font-family="Courier New, monospace" font-size="5" font-weight="bold" fill="black" text-anchor="middle">T</text>

  <!-- Top terminal lead -->
  <line x1="20" y1="2" x2="20" y2="8" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bottom terminal lead -->
  <line x1="20" y1="32" x2="20" y2="38" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
</svg>
