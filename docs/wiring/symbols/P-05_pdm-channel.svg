<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <title>P-05 PDM Channel Output</title>
  <desc>PDM30 output channel symbol. Rectangle with channel number inside, current rating below, output state indicator. Used at each PDM30 output channel (30 instances on Section 4). 5mm wide x 8mm tall per spec.</desc>

  <!-- Input lead (top) -->
  <line x1="20" y1="4" x2="20" y2="8" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Channel rectangle -->
  <rect x="10" y="8" width="20" height="20" rx="1" ry="1" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- Channel number placeholder text -->
  <text x="20" y="19" font-family="Courier New, monospace" font-size="7" font-weight="bold" fill="black" text-anchor="middle" dominant-baseline="middle">CH</text>

  <!-- Current rating placeholder -->
  <text x="20" y="25" font-family="Courier New, monospace" font-size="4.5" fill="black" text-anchor="middle">10A</text>

  <!-- Output lead (bottom) -->
  <line x1="20" y1="28" x2="20" y2="36" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Output state dot (closed = filled) -->
  <circle cx="26" cy="13" r="1.5" fill="black" stroke="black" stroke-width="0.5"/>
</svg>
