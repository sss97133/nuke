<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <title>R-04 Shielded Cable Indicator</title>
  <desc>Shielded cable symbol. Parallel signal lines enclosed by dashed envelope representing the shield, with shield drain wire shown as separate conductor. Used for crank sensor cable, cam sensor cable, and knock sensor cables (4 instances total). Envelope 2mm wider than enclosed wires per spec.</desc>

  <!-- Shield envelope (dashed rectangle) -->
  <rect x="4" y="8" width="32" height="18" rx="2" ry="2" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Signal conductor 1 (inside shield) -->
  <line x1="2" y1="14" x2="38" y2="14" stroke="black" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Signal conductor 2 (inside shield) -->
  <line x1="2" y1="20" x2="38" y2="20" stroke="black" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Shield drain wire (below envelope, separate conductor) -->
  <line x1="20" y1="26" x2="20" y2="34" stroke="black" stroke-width="1" stroke-linecap="round"/>

  <!-- Drain wire connection to shield (short horizontal from shield to drain) -->
  <line x1="18" y1="26" x2="22" y2="26" stroke="black" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Shield ground symbol at drain wire end -->
  <line x1="16" y1="34" x2="24" y2="34" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="17.5" y1="36" x2="22.5" y2="36" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="19" y1="38" x2="21" y2="38" stroke="black" stroke-width="1" stroke-linecap="round"/>

  <!-- Cross-hatch marks on shield envelope (indicating shielding) -->
  <line x1="9" y1="8" x2="11" y2="11" stroke="black" stroke-width="0.6"/>
  <line x1="15" y1="8" x2="17" y2="11" stroke="black" stroke-width="0.6"/>
  <line x1="21" y1="8" x2="23" y2="11" stroke="black" stroke-width="0.6"/>
  <line x1="27" y1="8" x2="29" y2="11" stroke="black" stroke-width="0.6"/>
  <line x1="9" y1="23" x2="11" y2="26" stroke="black" stroke-width="0.6"/>
  <line x1="15" y1="23" x2="17" y2="26" stroke="black" stroke-width="0.6"/>
  <line x1="21" y1="23" x2="23" y2="26" stroke="black" stroke-width="0.6"/>
  <line x1="27" y1="23" x2="29" y2="26" stroke="black" stroke-width="0.6"/>
</svg>
