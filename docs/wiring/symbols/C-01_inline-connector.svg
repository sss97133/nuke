<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <title>C-01 Inline Connector (Mating Pair)</title>
  <desc>Inline connector pair symbol. Two rectangular halves facing each other with aligned pin/socket indicators and connector ID label. Used at every point where two harness sections connect inline (engine-to-dash at firewall, dash-to-rear). 4mm x varies per spec.</desc>

  <!-- Left harness lead -->
  <line x1="2" y1="20" x2="8" y2="20" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left connector half (pin side) -->
  <rect x="8" y="12" width="10" height="16" rx="1" ry="1" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- Pin indicators (left half - protruding pins) -->
  <line x1="18" y1="16" x2="20" y2="16" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="20" x2="20" y2="20" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="24" x2="20" y2="24" stroke="black" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Right connector half (socket side) -->
  <rect x="22" y="12" width="10" height="16" rx="1" ry="1" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- Socket indicators (right half - recessed sockets) -->
  <circle cx="23.5" cy="16" r="1" fill="none" stroke="black" stroke-width="0.8"/>
  <circle cx="23.5" cy="20" r="1" fill="none" stroke="black" stroke-width="0.8"/>
  <circle cx="23.5" cy="24" r="1" fill="none" stroke="black" stroke-width="0.8"/>

  <!-- Right harness lead -->
  <line x1="32" y1="20" x2="38" y2="20" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mating gap indicator (dashed center line) -->
  <line x1="20" y1="10" x2="20" y2="30" stroke="black" stroke-width="0.5" stroke-dasharray="1,1.5"/>

  <!-- Keying tab (top notch on left half) -->
  <rect x="13" y="10" width="4" height="2" fill="white" stroke="black" stroke-width="1"/>
</svg>
