<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <title>O-10 Electronic Throttle Body (DBW)</title>
  <desc>Drive-by-wire throttle body symbol. Circle with M (motor) inside plus dual arrow for H-bridge drive, TPS indicators on opposite side, 6 terminals (Motor+, Motor-, TPS1 5Vref, TPS1 signal, TPS2 signal, sensor ground). Used for GM 12605109 LS3 90mm electronic throttle body. 10mm x 12mm per spec.</desc>

  <!-- Motor circle (left half of symbol) -->
  <circle cx="14" cy="20" r="10" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- M label inside motor circle -->
  <text x="14" y="22" font-family="Courier New, monospace" font-size="8" font-weight="bold" fill="black" text-anchor="middle" dominant-baseline="middle">M</text>

  <!-- Bidirectional arrows (H-bridge indicator) -->
  <line x1="6" y1="14" x2="6" y2="26" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <polygon points="6,14 4,17 8,17" fill="black" stroke="none"/>
  <polygon points="6,26 4,23 8,23" fill="black" stroke="none"/>

  <!-- TPS sensor block (right side) -->
  <rect x="26" y="12" width="10" height="16" rx="1" ry="1" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- TPS label -->
  <text x="31" y="18" font-family="Courier New, monospace" font-size="4" font-weight="bold" fill="black" text-anchor="middle">TPS</text>
  <text x="31" y="24" font-family="Courier New, monospace" font-size="4" fill="black" text-anchor="middle">1+2</text>

  <!-- Connection line between motor and TPS (butterfly shaft) -->
  <line x1="24" y1="20" x2="26" y2="20" stroke="black" stroke-width="1" stroke-dasharray="2,1"/>

  <!-- Motor terminal M+ (left-top) -->
  <line x1="4" y1="16" x2="1" y2="16" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Motor terminal M- (left-bottom) -->
  <line x1="4" y1="24" x2="1" y2="24" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

  <!-- TPS terminals (right side) -->
  <!-- 5V ref -->
  <line x1="36" y1="15" x2="39" y2="15" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- TPS1 signal -->
  <line x1="36" y1="19" x2="39" y2="19" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- TPS2 signal -->
  <line x1="36" y1="23" x2="39" y2="23" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sensor ground -->
  <line x1="36" y1="27" x2="39" y2="27" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
</svg>
