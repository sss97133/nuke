<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3200 2200" width="3200" height="2200">
<defs>
  <style>
    .body { fill: none; stroke: #333; stroke-width: 3; }
    .body-inner { fill: none; stroke: #666; stroke-width: 1.5; }
    .dash { fill: #DDD; stroke: #555; stroke-width: 2; }
    .seat { fill: #E8E8E8; stroke: #888; stroke-width: 1.5; rx: 8; }
    .seat-back { fill: #DDD; stroke: #888; stroke-width: 1.5; }
    .door { fill: none; stroke: #444; stroke-width: 2; }
    .door-opening { fill: none; stroke: #888; stroke-width: 1; stroke-dasharray: 6,3; }
    .window { fill: rgba(180,220,255,0.3); stroke: #8AC; stroke-width: 1; }
    .firewall { stroke: #C00; stroke-width: 3; }
    .floor { fill: #F5F5F0; stroke: none; }
    .frame-ghost { fill: none; stroke: #DDD; stroke-width: 4; }
    .frame-xm-ghost { fill: none; stroke: #E8E8E8; stroke-width: 2; }
    .pedals { fill: #AAA; stroke: #666; stroke-width: 1; }
    .steering { fill: none; stroke: #555; stroke-width: 2; }
    .console { fill: #DDD; stroke: #888; stroke-width: 1; }
    .device { stroke-width: 2; rx: 4; }
    .device-ecu { fill: rgba(200,0,0,0.2); stroke: #C00; }
    .device-pdm { fill: rgba(0,100,200,0.2); stroke: #06C; }
    .device-display { fill: rgba(255,140,0,0.2); stroke: #F80; }
    .device-logger { fill: rgba(255,102,0,0.2); stroke: #F60; }
    .device-audio { fill: rgba(0,150,200,0.2); stroke: #09C; }
    .grommet { fill: rgba(100,100,100,0.4); stroke: #444; stroke-width: 2; }
    .lbl { font-family: 'Courier New', monospace; font-size: 10px; fill: #444; }
    .lbl-device { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; }
    .lbl-sm { font-family: 'Courier New', monospace; font-size: 8px; fill: #888; }
    .lbl-zone { font-family: Arial, sans-serif; font-size: 16px; fill: #CCC; font-weight: bold; }
    .dim { font-family: 'Courier New', monospace; font-size: 8px; fill: #AAA; }
    .dim-line { stroke: #CCC; stroke-width: 0.75; }
    .title { font-family: Arial, sans-serif; font-weight: bold; }
    .harness-trunk { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; opacity: 0.6; }
    .harness-branch { fill: none; stroke-width: 2; stroke-linecap: round; opacity: 0.5; }
    .centerline { stroke: #DDD; stroke-width: 0.5; stroke-dasharray: 12,4,2,4; }
  </style>
</defs>

<!-- Background -->
<rect width="3200" height="2200" fill="#FEFEFE"/>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- K5 BLAZER FLOOR PLAN — TOP DOWN VIEW                   -->
<!-- Looking down through the roof                          -->
<!-- Scale: 20px = 1 inch                                   -->
<!-- Body width: ~76" = 1520px                              -->
<!-- Body length (firewall to endgate): ~115" = 2300px      -->
<!-- Front = LEFT, Rear = RIGHT                              -->
<!-- Driver = TOP, Passenger = BOTTOM                        -->
<!-- Origin: x=200, y=1100 = firewall centerline             -->
<!-- ═══════════════════════════════════════════════════════ -->

<g id="floor" transform="translate(200, 1100)">

  <!-- CENTERLINE -->
  <line x1="-100" y1="0" x2="2400" y2="0" class="centerline"/>

  <!-- ═══════════════════════════════════ -->
  <!-- GHOST FRAME RAILS (underneath)      -->
  <!-- Visible through floor to show       -->
  <!-- where harness routes along frame    -->
  <!-- ═══════════════════════════════════ -->
  <line x1="-100" y1="-340" x2="2300" y2="-340" class="frame-ghost"/>
  <line x1="-100" y1="340" x2="2300" y2="340" class="frame-ghost"/>
  <text x="-80" y="-345" class="dim">DRIVER FRAME RAIL</text>
  <text x="-80" y="355" class="dim">PASSENGER FRAME RAIL</text>

  <!-- Ghost crossmembers -->
  <line x1="340" y1="-340" x2="340" y2="340" class="frame-xm-ghost"/>
  <line x1="540" y1="-280" x2="540" y2="280" class="frame-xm-ghost"/>
  <line x1="1380" y1="-340" x2="1380" y2="340" class="frame-xm-ghost"/>

  <!-- ═══════════════════════════════════ -->
  <!-- BODY SHELL                          -->
  <!-- ═══════════════════════════════════ -->

  <!-- Floor area fill -->
  <rect x="0" y="-720" width="2300" height="1440" rx="20" class="floor"/>

  <!-- Outer body walls -->
  <rect x="0" y="-760" width="2300" height="1520" rx="25" class="body"/>

  <!-- FIREWALL (x=0) -->
  <line x1="0" y1="-760" x2="0" y2="760" class="firewall"/>
  <text x="-10" y="-770" text-anchor="end" class="title" font-size="14" fill="#C00">FIREWALL</text>

  <!-- ENDGATE (x=2300) -->
  <line x1="2300" y1="-700" x2="2300" y2="700" class="body" stroke-width="3"/>
  <text x="2310" y="-710" class="title" font-size="12" fill="#444">ENDGATE</text>

  <!-- ═══════════════════════════════════ -->
  <!-- DOORS                               -->
  <!-- ═══════════════════════════════════ -->

  <!-- Driver door (top) — opening from ~3" to ~45" from firewall -->
  <line x1="60" y1="-760" x2="900" y2="-760" class="door" stroke-width="4"/>
  <text x="480" y="-775" text-anchor="middle" class="lbl">DRIVER DOOR</text>
  <!-- Door jamb grommet location -->
  <circle cx="70" cy="-750" r="8" class="grommet"/>
  <text x="85" y="-745" class="lbl-sm" fill="#444">DOOR HARNESS</text>

  <!-- Passenger door (bottom) -->
  <line x1="60" y1="760" x2="900" y2="760" class="door" stroke-width="4"/>
  <text x="480" y="790" text-anchor="middle" class="lbl">PASSENGER DOOR</text>
  <circle cx="70" cy="750" r="8" class="grommet"/>
  <text x="85" y="765" class="lbl-sm" fill="#444">DOOR HARNESS</text>

  <!-- A-pillars -->
  <rect x="30" y="-765" width="35" height="15" rx="3" fill="#999" stroke="#555" stroke-width="1"/>
  <rect x="30" y="750" width="35" height="15" rx="3" fill="#999" stroke="#555" stroke-width="1"/>

  <!-- B-pillars -->
  <rect x="890" y="-765" width="30" height="15" rx="3" fill="#999" stroke="#555" stroke-width="1"/>
  <rect x="890" y="750" width="30" height="15" rx="3" fill="#999" stroke="#555" stroke-width="1"/>

  <!-- ═══════════════════════════════════ -->
  <!-- DASH PANEL                          -->
  <!-- ═══════════════════════════════════ -->

  <!-- Dash structure -->
  <rect x="20" y="-680" width="80" height="1360" rx="5" class="dash"/>
  <text x="60" y="0" text-anchor="middle" transform="rotate(-90,60,0)" class="lbl" font-size="12" fill="#666">DASHBOARD</text>

  <!-- Gauge cluster (driver side) -->
  <rect x="30" y="-500" width="60" height="200" rx="8" fill="#BBB" stroke="#777" stroke-width="1.5"/>
  <text x="60" y="-390" text-anchor="middle" class="lbl-sm" fill="#555">GAUGE</text>
  <text x="60" y="-380" text-anchor="middle" class="lbl-sm" fill="#555">CLUSTER</text>

  <!-- Center stack -->
  <rect x="30" y="-120" width="60" height="240" rx="5" fill="#CCC" stroke="#888" stroke-width="1"/>
  <text x="60" y="0" text-anchor="middle" class="lbl-sm" fill="#666">CENTER</text>
  <text x="60" y="12" text-anchor="middle" class="lbl-sm" fill="#666">STACK</text>

  <!-- Glove box area (passenger) -->
  <rect x="30" y="300" width="60" height="250" rx="5" fill="#DDD" stroke="#AAA" stroke-width="1"/>
  <text x="60" y="430" text-anchor="middle" class="lbl-sm" fill="#888">GLOVE</text>

  <!-- ═══════════════════════════════════ -->
  <!-- STEERING                            -->
  <!-- ═══════════════════════════════════ -->
  <circle cx="220" cy="-380" r="80" class="steering"/>
  <circle cx="220" cy="-380" r="5" fill="#555"/>
  <text x="220" y="-375" text-anchor="middle" class="lbl-sm" fill="#555">WHEEL</text>

  <!-- Steering column -->
  <line x1="100" y1="-380" x2="220" y2="-380" stroke="#777" stroke-width="4"/>

  <!-- ═══════════════════════════════════ -->
  <!-- PEDALS                              -->
  <!-- ═══════════════════════════════════ -->
  <rect x="120" y="-520" width="30" height="25" rx="3" class="pedals"/>
  <text x="135" y="-530" text-anchor="middle" class="lbl-sm">CLT</text>
  <rect x="120" y="-470" width="35" height="30" rx="3" class="pedals"/>
  <text x="137" y="-478" text-anchor="middle" class="lbl-sm">BRK</text>
  <rect x="130" y="-420" width="30" height="25" rx="3" class="pedals"/>
  <text x="145" y="-428" text-anchor="middle" class="lbl-sm">GAS</text>

  <!-- ═══════════════════════════════════ -->
  <!-- SEATS                               -->
  <!-- ═══════════════════════════════════ -->

  <!-- Front bench seat / bucket seats -->
  <!-- Driver bucket -->
  <rect x="250" y="-580" width="300" height="380" rx="15" class="seat"/>
  <rect x="250" y="-620" width="300" height="50" rx="10" class="seat-back"/>
  <text x="400" y="-400" text-anchor="middle" class="lbl" fill="#888">DRIVER SEAT</text>

  <!-- Passenger bucket -->
  <rect x="250" y="200" width="300" height="380" rx="15" class="seat"/>
  <rect x="250" y="160" width="300" height="50" rx="10" class="seat-back"/>
  <text x="400" y="400" text-anchor="middle" class="lbl" fill="#888">PASSENGER SEAT</text>

  <!-- Center console -->
  <rect x="280" y="-100" width="240" height="200" rx="8" class="console"/>
  <text x="400" y="5" text-anchor="middle" class="lbl-sm" fill="#666">CONSOLE / TRANS TUNNEL</text>

  <!-- Rear bench seat -->
  <rect x="950" y="-600" width="300" height="1200" rx="15" class="seat"/>
  <rect x="920" y="-580" width="40" height="1160" rx="8" class="seat-back"/>
  <text x="1100" y="5" text-anchor="middle" class="lbl" fill="#888">REAR SEAT</text>

  <!-- ═══════════════════════════════════ -->
  <!-- CARGO AREA                          -->
  <!-- ═══════════════════════════════════ -->
  <text x="1700" y="0" text-anchor="middle" class="lbl-zone">CARGO AREA</text>

  <!-- Wheel wells in cargo area -->
  <rect x="1380" y="-750" width="160" height="100" rx="8" fill="#E0E0E0" stroke="#AAA" stroke-width="1"/>
  <text x="1460" y="-695" text-anchor="middle" class="lbl-sm">WHEEL WELL</text>
  <rect x="1380" y="650" width="160" height="100" rx="8" fill="#E0E0E0" stroke="#AAA" stroke-width="1"/>
  <text x="1460" y="705" text-anchor="middle" class="lbl-sm">WHEEL WELL</text>

  <!-- Fuel tank (passenger side, behind rear axle) -->
  <rect x="1600" y="400" width="300" height="250" rx="10" fill="rgba(255,200,0,0.1)" stroke="#DA0" stroke-width="1.5"/>
  <text x="1750" y="530" text-anchor="middle" class="lbl" fill="#DA0">FUEL TANK</text>

  <!-- ═══════════════════════════════════ -->
  <!-- FIREWALL PENETRATIONS               -->
  <!-- (where wires pass through)          -->
  <!-- ═══════════════════════════════════ -->

  <!-- Grommet H1: Engine harness (passenger side upper) -->
  <circle cx="0" cy="250" r="16" class="grommet"/>
  <text x="-25" y="245" text-anchor="end" class="lbl-sm" fill="#C00">H1 ENGINE</text>
  <text x="-25" y="257" text-anchor="end" class="lbl-sm" fill="#C00">33 wires</text>

  <!-- Grommet H2: Power cables -->
  <circle cx="0" cy="400" r="12" class="grommet"/>
  <text x="-25" y="395" text-anchor="end" class="lbl-sm" fill="#C00">H2 POWER</text>
  <text x="-25" y="407" text-anchor="end" class="lbl-sm" fill="#C00">6+16AWG</text>

  <!-- Grommet H3: A/C lines -->
  <circle cx="0" cy="-100" r="12" class="grommet"/>
  <text x="-25" y="-95" text-anchor="end" class="lbl-sm" fill="#C00">H3 A/C</text>

  <!-- Grommet H4: Heater / steering column area -->
  <circle cx="0" cy="-300" r="12" class="grommet"/>
  <text x="-25" y="-295" text-anchor="end" class="lbl-sm" fill="#C00">H4 HEATER</text>

  <!-- Steering column penetration -->
  <circle cx="0" cy="-380" r="18" fill="none" stroke="#555" stroke-width="2"/>
  <text x="-25" y="-375" text-anchor="end" class="lbl-sm" fill="#555">COLUMN</text>

  <!-- Brake booster -->
  <circle cx="0" cy="-500" r="22" fill="rgba(0,0,0,0.05)" stroke="#777" stroke-width="1.5"/>
  <text x="-25" y="-495" text-anchor="end" class="lbl-sm" fill="#555">iBOOSTER</text>

  <!-- ═══════════════════════════════════ -->
  <!-- MOTEC DEVICES — INTERIOR LOCATIONS  -->
  <!-- ═══════════════════════════════════ -->

  <!-- M130 ECU — firewall, passenger side, under dash -->
  <rect x="20" y="200" width="90" height="60" rx="5" class="device device-ecu"/>
  <text x="65" y="225" text-anchor="middle" class="lbl-device" fill="#C00">M130</text>
  <text x="65" y="240" text-anchor="middle" class="lbl-sm" fill="#C00">ECU 60-pin</text>
  <text x="65" y="252" text-anchor="middle" class="lbl-sm" fill="#C00">(FW pass side)</text>

  <!-- PDM30 — under dash, passenger side -->
  <rect x="20" y="370" width="90" height="55" rx="5" class="device device-pdm"/>
  <text x="65" y="393" text-anchor="middle" class="lbl-device" fill="#06C">PDM30</text>
  <text x="65" y="408" text-anchor="middle" class="lbl-sm" fill="#06C">61-pin</text>

  <!-- C125 Display — dash center, visible to driver -->
  <rect x="35" y="-260" width="50" height="80" rx="4" class="device device-display"/>
  <text x="60" y="-215" text-anchor="middle" class="lbl-device" fill="#F80">C125</text>
  <text x="60" y="-200" text-anchor="middle" class="lbl-sm" fill="#F80">DISPLAY</text>

  <!-- LTCD Logger — under dash, near PDM -->
  <rect x="20" y="100" width="70" height="40" rx="4" class="device device-logger"/>
  <text x="55" y="120" text-anchor="middle" class="lbl-device" fill="#F60">LTCD</text>
  <text x="55" y="133" text-anchor="middle" class="lbl-sm" fill="#F60">LOGGER</text>

  <!-- Dakota Digital VHX gauges — in cluster position -->
  <rect x="35" y="-490" width="55" height="180" rx="5" class="device device-display"/>
  <text x="62" y="-400" text-anchor="middle" class="lbl-device" fill="#F80">VHX</text>
  <text x="62" y="-385" text-anchor="middle" class="lbl-sm" fill="#F80">GAUGES</text>

  <!-- Head unit — center stack -->
  <rect x="35" y="-80" width="50" height="60" rx="4" class="device device-audio"/>
  <text x="60" y="-45" text-anchor="middle" class="lbl-device" fill="#09C">HEAD</text>
  <text x="60" y="-32" text-anchor="middle" class="lbl-sm" fill="#09C">UNIT</text>

  <!-- Kicker amp — under driver seat or rear cargo -->
  <rect x="1300" y="-500" width="100" height="60" rx="5" class="device device-audio"/>
  <text x="1350" y="-465" text-anchor="middle" class="lbl-device" fill="#09C">AMP</text>
  <text x="1350" y="-450" text-anchor="middle" class="lbl-sm" fill="#09C">CXA400.1</text>

  <!-- Speakers — driver/passenger doors -->
  <circle cx="80" cy="-660" r="20" fill="rgba(0,150,200,0.1)" stroke="#09C" stroke-width="1"/>
  <text x="80" y="-655" text-anchor="middle" class="lbl-sm" fill="#09C">SPK-L</text>
  <circle cx="80" cy="660" r="20" fill="rgba(0,150,200,0.1)" stroke="#09C" stroke-width="1"/>
  <text x="80" y="665" text-anchor="middle" class="lbl-sm" fill="#09C">SPK-R</text>

  <!-- E-Stopp electric parking brake controller -->
  <rect x="150" y="-140" width="60" height="35" rx="3" fill="rgba(200,0,0,0.1)" stroke="#C00" stroke-width="1"/>
  <text x="180" y="-120" text-anchor="middle" class="lbl-sm" fill="#C00">E-STOPP</text>

  <!-- ═══════════════════════════════════ -->
  <!-- HARNESS TRUNK ROUTES (inside cab)   -->
  <!-- ═══════════════════════════════════ -->

  <!-- CAN bus backbone: M130 → PDM30 → LTCD → C125 (short runs, all under dash pass side) -->
  <polyline points="65,200 65,140 55,100" class="harness-trunk" stroke="#F60" stroke-width="2" stroke-dasharray="4,2"/>
  <polyline points="65,260 65,370" class="harness-trunk" stroke="#F60" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="85" y="160" class="lbl-sm" fill="#F60">CAN BUS</text>

  <!-- Dash loom: PDM30 → along firewall → across dash → driver cluster -->
  <polyline points="65,370 30,370 30,-260 35,-400" class="harness-trunk" stroke="#080" stroke-width="3"/>
  <text x="10" y="50" class="lbl-sm" fill="#080" transform="rotate(-90,10,50)">DASH LOOM</text>

  <!-- Rear loom: PDM30 → through floor → along driver rocker → rear -->
  <polyline points="65,420 200,500 200,600 200,650" class="harness-trunk" stroke="#06C"/>
  <!-- Floor penetration -->
  <circle cx="200" cy="650" r="10" class="grommet"/>
  <text x="220" y="655" class="lbl-sm" fill="#06C">FLOOR EXIT</text>
  <!-- (continues outside along driver frame rail — see frame drawing) -->

  <!-- Door harness branches -->
  <polyline points="30,-600 70,-660" class="harness-branch" stroke="#080"/>
  <polyline points="30,600 70,660" class="harness-branch" stroke="#080"/>

  <!-- Audio loom: head unit → under carpet → amp → speakers -->
  <polyline points="60,-20 150,-20 150,-100 400,-100 800,-100 1300,-470" class="harness-branch" stroke="#09C" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════ -->
  <!-- FLOOR GROMMET & PASS-THROUGH LABELS -->
  <!-- ═══════════════════════════════════ -->

  <!-- Floor pass-through to frame (for rear loom) -->
  <rect x="180" y="640" width="40" height="20" rx="4" fill="rgba(100,100,100,0.2)" stroke="#666" stroke-width="1"/>
  <text x="200" y="680" text-anchor="middle" class="lbl-sm">TO FRAME RAIL</text>

</g>

<!-- ═══════════════════════════════════ -->
<!-- LEGEND                              -->
<!-- ═══════════════════════════════════ -->
<g id="legend" transform="translate(30, 30)">
  <rect x="0" y="0" width="260" height="200" fill="white" stroke="#CCC" stroke-width="1" rx="4"/>
  <text x="130" y="20" text-anchor="middle" class="title" font-size="12">FLOOR / CAB — TOP VIEW</text>

  <rect x="15" y="35" width="25" height="14" rx="3" class="device device-ecu"/>
  <text x="50" y="46" class="lbl">MoTeC ECU/PDM</text>

  <rect x="15" y="57" width="25" height="14" rx="3" class="device device-display"/>
  <text x="50" y="68" class="lbl">Display / Gauges</text>

  <rect x="15" y="79" width="25" height="14" rx="3" class="device device-audio"/>
  <text x="50" y="90" class="lbl">Audio</text>

  <circle cx="27" cy="108" r="8" class="grommet"/>
  <text x="50" y="112" class="lbl">Grommet / pass-through</text>

  <line x1="15" y1="130" x2="45" y2="130" stroke="#080" stroke-width="3" opacity="0.6"/>
  <text x="50" y="134" class="lbl">Dash loom</text>

  <line x1="15" y1="148" x2="45" y2="148" stroke="#06C" stroke-width="3" opacity="0.6"/>
  <text x="50" y="152" class="lbl">Rear loom</text>

  <line x1="15" y1="166" x2="45" y2="166" stroke="#F60" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="50" y="170" class="lbl">CAN bus</text>

  <text x="15" y="192" class="lbl-sm">Scale: 20px = 1 inch</text>
</g>

<!-- ═══════════════════════════════════ -->
<!-- TITLE BLOCK                         -->
<!-- ═══════════════════════════════════ -->
<g id="titleblock">
  <rect x="2700" y="2090" width="480" height="95" fill="white" stroke="black" stroke-width="2" rx="4"/>
  <line x1="2700" y1="2118" x2="3180" y2="2118" stroke="black" stroke-width="1"/>
  <text x="2940" y="2112" text-anchor="middle" class="title" font-size="14">NUKE LTD — BOULDER CITY NV</text>
  <text x="2940" y="2138" text-anchor="middle" class="title" font-size="11">1977 K5 BLAZER — FLOOR PLAN VIEW</text>
  <text x="2940" y="2155" text-anchor="middle" class="lbl">CAB INTERIOR | MOTEC DEVICE LOCATIONS</text>
  <text x="2940" y="2172" text-anchor="middle" class="lbl-sm">VIN CCL187Z210370 | DWG K5-FLOOR-001 | 2026-04-05</text>
</g>

</svg>
